<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FamilyKids V16.7 Catálogo Funcional</title>
<style>
:root{--brand:#ff8a3d;--brand2:#32b9e8;--ink:#18181b;--muted:#777;--line:#ececec;--bg:#fafafa;--card:#fff;--radius:18px;--shadow:0 10px 30px rgba(0,0,0,.08)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}.top{background:#fff7ef;text-align:center;padding:8px;font-size:12px;color:#7a470c}.head{position:sticky;top:0;background:rgba(255,255,255,.96);z-index:20;display:flex;gap:10px;align-items:center;padding:10px 14px;box-shadow:0 2px 14px rgba(0,0,0,.06)}.logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--brand),#ffbe72);display:grid;place-items:center;color:#fff;font-weight:900;flex:none;overflow:hidden}.logo img{width:100%;height:100%;object-fit:cover}.search{flex:1;max-width:520px;display:flex;align-items:center;border:1px solid var(--line);border-radius:999px;background:#fff;padding:0 12px}.search input{width:100%;border:0;outline:0;padding:10px 6px;background:transparent;font-size:14px}.icon{width:36px;height:36px;border-radius:50%;background:#f6f6f6;display:grid;place-items:center;font-size:16px;position:relative}.icon .count{position:absolute;right:-4px;top:-4px;background:var(--brand);color:#fff;font-size:10px;border-radius:999px;padding:2px 5px}.hero{margin:14px;border-radius:26px;overflow:hidden;display:grid;grid-template-columns:1.1fr .9fr;min-height:310px;background:linear-gradient(135deg,#fff3e8,#eefaff);box-shadow:var(--shadow)}.copy{padding:32px}.copy small{background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-weight:800;color:#9a4a00}.copy h1{font-size:clamp(30px,5vw,52px);line-height:1;margin:18px 0 10px;letter-spacing:-1.6px}.copy p{color:#555;line-height:1.55}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 14px;font-weight:800}.primary{background:#111;color:#fff;border-color:#111}.hero-art{display:grid;place-items:center;background:radial-gradient(circle at center,#ffd4aa,var(--brand));position:relative}.hero-art:before{content:'★';position:absolute;left:20%;top:18%;color:#fff8;font-size:42px}.hero-logo{background:#fff;padding:20px;border-radius:24px;text-align:center;box-shadow:var(--shadow);font-weight:900;color:#ff7b20}.cats{display:flex;overflow:auto;gap:9px;padding:8px 14px 12px;background:#fff}.cat{white-space:nowrap;border-radius:999px;padding:10px 15px;background:#f3f4f6;color:#333;font-weight:800;font-size:14px}.cat.on{background:#111;color:#fff}.wrap{max-width:1240px;margin:auto;padding:0 14px 80px}.bar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin:18px 0;flex-wrap:wrap}.filters{display:flex;gap:8px;flex-wrap:wrap}.filters select{border:1px solid var(--line);border-radius:999px;background:#fff;padding:10px 12px}.campaigns{display:flex;gap:12px;overflow:auto;padding:4px 0 18px}.campaign{min-width:240px;background:#fff;border-radius:18px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--line)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.05)}.photo{aspect-ratio:1;background:linear-gradient(135deg,#fff6ec,#eefaff);display:grid;place-items:center;font-size:48px;position:relative}.fav{position:absolute;right:10px;top:10px;width:30px;height:30px;border-radius:50%;background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.12);font-size:14px;color:#999}.fav.on{color:#e11d48}.tag{position:absolute;left:10px;top:10px;background:var(--brand);color:#fff;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900}.info{padding:12px}.name{font-weight:900;min-height:38px;line-height:1.2}.price{font-size:20px;font-weight:950;margin-top:8px}.pix{font-size:12px;color:#088343;font-weight:850}.sizes{display:flex;gap:5px;flex-wrap:wrap;margin:9px 0}.sizes span{font-size:11px;border:1px solid var(--line);border-radius:8px;padding:4px 6px}.info .btn{width:100%;padding:9px;font-size:13px}.admin{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50;padding:20px}.admin.show{display:block}.panel{background:#fff;border-radius:22px;max-width:860px;margin:20px auto;padding:18px;max-height:88vh;overflow:auto}.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field label{font-size:12px;font-weight:900;color:#555}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:5px}.list-row{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:14px;padding:10px;margin:8px 0}.hidden-badge{font-size:11px;background:#fee2e2;color:#991b1b;border-radius:999px;padding:4px 7px}.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;display:none;justify-content:space-around;padding:9px 6px;box-shadow:0 -3px 16px rgba(0,0,0,.1);z-index:30}.bottom button{background:transparent;font-size:12px;color:#333}.drawer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:60}.drawer.show{display:block}.drawer-box{position:absolute;right:0;top:0;bottom:0;background:#fff;width:min(420px,92vw);padding:18px;overflow:auto}.empty{text-align:center;color:#777;padding:40px;background:#fff;border-radius:20px;border:1px dashed #ddd}@media(max-width:760px){.head{gap:7px}.logo{width:42px;height:42px}.search{max-width:none}.head .adminBtn{display:none}.hero{grid-template-columns:1fr;margin:10px;min-height:0}.copy{padding:22px}.hero-art{min-height:180px}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card{border-radius:16px}.info{padding:10px}.name{font-size:13px;min-height:32px}.price{font-size:18px}.bottom{display:flex}.admin-grid{grid-template-columns:1fr}.wrap{padding-bottom:90px}.bar{display:block}.filters{margin-top:10px}.filters select{max-width:100%}.fav{width:28px;height:28px}.top{font-size:11px}}
</style>
</head>
<body>
<div class="top">🚚 Frete • 💳 Parcelamento • 💬 Atendimento WhatsApp</div>
<header class="head"><div class="logo" id="logoBox">FK</div><div class="search">🔎<input id="q" placeholder="Pesquisar produtos" oninput="render()"></div><button class="icon" onclick="toggleFavOnly()">♡<span id="favCount" class="count">0</span></button><button class="icon" onclick="openCart()">🛒<span id="cartCount" class="count">0</span></button><button class="btn adminBtn" onclick="openAdmin()">Retaguarda</button></header>
<nav id="cats" class="cats"></nav>
<section class="hero"><div class="copy"><small id="heroTag"></small><h1 id="heroTitle"></h1><p id="heroSub"></p><button class="btn primary" id="heroBtn" onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})"></button></div><div class="hero-art"><div class="hero-logo">FAMILYKIDS<br><small>Moda Infantil</small></div></div></section>
<main class="wrap"><div class="campaigns" id="campaigns"></div><div class="bar"><div><h2 style="margin:0">Catálogo</h2><span id="found" class="small"></span></div><div class="filters"><select id="price" onchange="render()"><option value="all">Todos os preços</option><option value="99">Até R$99</option><option value="149">R$100 a R$149</option><option value="300">R$150 a R$300</option><option value="301">Acima de R$300</option></select><select id="size" onchange="render()"><option value="all">Todos os tamanhos</option><option>P</option><option>M</option><option>G</option><option>4</option><option>6</option><option>8</option><option>10</option><option>12</option><option>14</option><option>16</option></select></div></div><div id="products" class="grid"></div></main>
<nav class="bottom"><button onclick="window.scrollTo({top:0,behavior:'smooth'})">🏠<br>Início</button><button onclick="openAdmin()">⚙️<br>Retaguarda</button><button onclick="toggleFavOnly()">♡<br>Favoritos</button><button onclick="openCart()">🛒<br>Carrinho</button></nav>
<div id="admin" class="admin"><div class="panel"><div style="display:flex;justify-content:space-between;align-items:center"><h2>Retaguarda do Catálogo</h2><button class="icon" onclick="closeAdmin()">×</button></div><div class="admin-grid"><div class="field"><label>Texto pequeno do banner</label><input id="aTag"></div><div class="field"><label>Botão do banner</label><input id="aBtn"></div><div class="field" style="grid-column:1/-1"><label>Título do banner</label><input id="aTitle"></div><div class="field" style="grid-column:1/-1"><label>Subtítulo</label><textarea id="aSub"></textarea></div></div><button class="btn primary" onclick="saveBanner()" style="margin-top:12px">Salvar banner</button><hr><h3>Categorias e Subcategorias</h3><div style="display:flex;gap:8px;flex-wrap:wrap"><input id="newCat" placeholder="Nova categoria" style="flex:1;border:1px solid var(--line);border-radius:12px;padding:10px"><button class="btn" onclick="addCat()">Criar categoria</button></div><div id="adminCats"></div><hr><h3>Campanhas</h3><div id="adminCampaigns"></div></div></div>
<div id="drawer" class="drawer"><div class="drawer-box"><button class="icon" onclick="closeDrawer()">×</button><div id="drawerContent"></div></div></div>
<script>
const LS='fk_catalog_v167';
let S=JSON.parse(localStorage.getItem(LS)||'null')||{favOnly:false,activeCat:'Todos',favorites:[],cart:[],banner:{tag:'Novidades FamilyKids',title:'Looks infantis escolhidos com carinho',sub:'Vitrine premium com rolagem fluida, categorias editáveis e identidade FamilyKids.',btn:'Comprar agora'},categories:[{name:'Todos',show:true,subs:[]},{name:'Meninas',show:true,subs:['Vestidos','Conjuntos']},{name:'Meninos',show:true,subs:['Conjuntos','Camisetas']},{name:'Bebês',show:true,subs:['Body','Macacão']},{name:'Acessórios',show:true,subs:['Laços','Tiaras']},{name:'Promoções',show:true,subs:[]},{name:'Lançamentos',show:true,subs:[]}],campaigns:[{name:'Campanha Inverno',show:true},{name:'Liquidação',show:true},{name:'Lançamentos',show:true},{name:'Escolhas da IA',show:true}],products:[{id:1,name:'Vestido Floral Premium',cat:'Meninas',price:109.9,sizes:['4','6','8'],tag:'NOVO'},{id:2,name:'Conjunto Dino Moletom',cat:'Meninos',price:129.9,sizes:['4','6','8','10'],tag:'NOVO'},{id:3,name:'Jaqueta Kids',cat:'Meninos',price:219.9,sizes:['8','10','12'],tag:'PREMIUM'},{id:4,name:'Laço Boutique',cat:'Acessórios',price:24.9,sizes:['Único'],tag:'PROMO'},{id:5,name:'Macacão Bebê',cat:'Bebês',price:89.9,sizes:['P','M','G'],tag:'FOFO'},{id:6,name:'Vestido Festa Luxo',cat:'Meninas',price:269.9,sizes:['6','8','10','12'],tag:'LUXO'}]};
function save(){localStorage.setItem(LS,JSON.stringify(S))}function money(v){return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function render(){document.getElementById('heroTag').textContent=S.banner.tag;document.getElementById('heroTitle').textContent=S.banner.title;document.getElementById('heroSub').textContent=S.banner.sub;document.getElementById('heroBtn').textContent=S.banner.btn;document.getElementById('cats').innerHTML=S.categories.filter(c=>c.show).map(c=>`<button class="cat ${S.activeCat===c.name?'on':''}" onclick="S.activeCat='${c.name}';render()">${c.name}</button>`).join('');document.getElementById('campaigns').innerHTML=S.campaigns.filter(c=>c.show).map(c=>`<div class="campaign"><b>${c.name}</b><br><span class="small">Campanha editável na retaguarda</span></div>`).join('');let q=document.getElementById('q').value.toLowerCase(),pr=document.getElementById('price').value,sz=document.getElementById('size').value;let list=S.products.filter(p=>(S.activeCat==='Todos'||p.cat===S.activeCat)&&(!q||p.name.toLowerCase().includes(q))&&(!S.favOnly||S.favorites.includes(p.id))&&(sz==='all'||p.sizes.includes(sz)));list=list.filter(p=>pr==='all'||(pr==='99'?p.price<=99:pr==='149'?p.price>=100&&p.price<=149:pr==='300'?p.price>=150&&p.price<=300:p.price>300));document.getElementById('found').textContent=list.length+' produtos encontrados';document.getElementById('products').innerHTML=list.length?list.map(card).join(''):'<div class="empty">Nenhum produto encontrado.</div>';document.getElementById('favCount').textContent=S.favorites.length;document.getElementById('cartCount').textContent=S.cart.length;save()}
function card(p){let fav=S.favorites.includes(p.id);return `<article class="card"><div class="photo"><span class="tag">${p.tag}</span><button class="fav ${fav?'on':''}" onclick="fav(${p.id})">♥</button>👕</div><div class="info"><div class="name">${p.name}</div><div class="price">${money(p.price)}</div><div class="pix">PIX ${money(p.price*.95)}</div><div class="sizes">${p.sizes.map(s=>`<span>${s}</span>`).join('')}</div><button class="btn primary" onclick="addCart(${p.id})">Adicionar</button></div></article>`}
function fav(id){S.favorites=S.favorites.includes(id)?S.favorites.filter(x=>x!==id):[...S.favorites,id];render()}function addCart(id){S.cart.push(id);render()}function toggleFavOnly(){S.favOnly=!S.favOnly;render()}function openCart(){let items=S.cart.map(id=>S.products.find(p=>p.id===id)).filter(Boolean);document.getElementById('drawerContent').innerHTML='<h2>Carrinho</h2>'+items.map(p=>`<div class="list-row"><span>${p.name}</span><b>${money(p.price)}</b></div>`).join('')+'<button class="btn primary" style="width:100%">Finalizar no WhatsApp</button>';document.getElementById('drawer').classList.add('show')}function closeDrawer(){document.getElementById('drawer').classList.remove('show')}
function openAdmin(){document.getElementById('aTag').value=S.banner.tag;document.getElementById('aTitle').value=S.banner.title;document.getElementById('aSub').value=S.banner.sub;document.getElementById('aBtn').value=S.banner.btn;drawAdmin();document.getElementById('admin').classList.add('show')}function closeAdmin(){document.getElementById('admin').classList.remove('show')}function saveBanner(){S.banner={tag:aTag.value,title:aTitle.value,sub:aSub.value,btn:aBtn.value};save();render();closeAdmin()}
function drawAdmin(){document.getElementById('adminCats').innerHTML=S.categories.map((c,i)=>`<div class="list-row"><div><b>${c.name}</b> ${!c.show?'<span class="hidden-badge">Oculta</span>':''}<br><span class="small">Subcategorias: ${c.subs.join(', ')||'nenhuma'}</span></div><div><button class="btn" onclick="toggleCat(${i})">${c.show?'Ocultar':'Exibir'}</button><button class="btn" onclick="editCat(${i})">Editar</button><button class="btn" onclick="delCat(${i})">Excluir</button></div></div>`).join('');document.getElementById('adminCampaigns').innerHTML=S.campaigns.map((c,i)=>`<div class="list-row"><b>${c.name}</b><button class="btn" onclick="S.campaigns[${i}].show=!S.campaigns[${i}].show;save();drawAdmin();render()">${c.show?'Ocultar':'Exibir'}</button></div>`).join('')}
function addCat(){let n=newCat.value.trim();if(!n)return;S.categories.push({name:n,show:true,subs:[]});newCat.value='';drawAdmin();render()}function toggleCat(i){S.categories[i].show=!S.categories[i].show;drawAdmin();render()}function editCat(i){let n=prompt('Nome da categoria',S.categories[i].name);if(n)S.categories[i].name=n;let subs=prompt('Subcategorias separadas por vírgula',S.categories[i].subs.join(','));if(subs!==null)S.categories[i].subs=subs.split(',').map(x=>x.trim()).filter(Boolean);drawAdmin();render()}function delCat(i){if(i===0)return alert('Todos não pode ser excluído.');if(confirm('Excluir categoria? Produtos não serão apagados.')){S.categories.splice(i,1);drawAdmin();render()}}
render();
</script>
</body></html>
