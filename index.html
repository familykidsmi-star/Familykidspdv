<title>FamilyKids ERP • PDV • Catálogo</title>
<style>
:root{--orange:#f47b20;--orange2:#ff9f1a;--brown:#934806;--cream:#fff7ea;--ink:#151a24;--muted:#69707d;--line:#eadbc6;--green:#14b86a;--red:#e53935;--blue:#20a7e8;--lilac:#9b54d6;--shadow:0 12px 32px rgba(111,58,0,.13);--r:22px}
*{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:linear-gradient(180deg,#fffaf1 0%,#fff 55%,#fffaf1)} button,input,select,textarea{font:inherit} button{cursor:pointer;border:0}.hidden{display:none!important}
.app{min-height:100vh}.top{height:70px;background:linear-gradient(135deg,var(--orange),#d16600 60%,#ffc04b);color:#fff;display:flex;align-items:center;gap:14px;padding:0 18px;position:sticky;top:0;z-index:50;box-shadow:0 6px 22px rgba(214,102,0,.22)}
.iconBtn{width:48px;height:48px;border-radius:18px;background:rgba(255,255,255,.16);display:grid;place-items:center;color:#fff;font-size:24px}.status{border:2px solid rgba(255,255,255,.75);border-radius:16px;padding:10px 14px;font-weight:900;white-space:nowrap}.searchTop{flex:1;max-width:520px;background:#fff;border-radius:18px;display:flex;align-items:center;padding:0 14px;color:#777}.searchTop input{height:46px;border:0;outline:0;width:100%;font-size:15px}.avatar{width:48px;height:48px;border-radius:50%;background:#fff;color:var(--brown);font-weight:900;display:grid;place-items:center}.content{padding:22px;max-width:1380px;margin:auto}.layout{display:flex}.sidebar{position:fixed;top:70px;bottom:0;left:0;width:340px;max-width:82vw;background:linear-gradient(180deg,#ff7a00,#ffb13e);color:#fff;z-index:70;transform:translateX(-105%);transition:.22s;box-shadow:22px 0 50px rgba(0,0,0,.22);padding:22px;overflow:auto}.sidebar.open{transform:translateX(0)}.shade{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60}.brand{display:flex;align-items:center;gap:14px;margin-bottom:20px}.brand img{width:78px;height:78px;border-radius:22px;object-fit:cover;background:#fff}.brand h2{margin:0;font-size:25px}.menuSearch{background:rgba(255,255,255,.17);border:1px solid rgba(255,255,255,.24);border-radius:17px;padding:12px 14px;margin:12px 0 18px}.menuSearch input{background:transparent;border:0;outline:0;color:#fff;width:100%}.menuSearch input::placeholder{color:#ffe8ca}.navItem,.navGroup{display:flex;align-items:center;gap:14px;padding:14px 14px;border-radius:16px;color:#fff;font-weight:900;font-size:19px;margin:5px 0}.navItem.active,.navGroup.active{background:rgba(255,255,255,.28)}.navItem small{margin-left:auto;font-size:12px;background:#fff;color:var(--orange);border-radius:999px;padding:4px 8px}.submenu{padding-left:32px;display:none}.submenu.open{display:block}.sub{padding:11px 14px;border-radius:14px;font-weight:800;color:#fff;opacity:.95}.sub:hover{background:rgba(255,255,255,.14)}
.titleRow{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}.h1{font-size:40px;font-weight:950;margin:0;color:var(--brown)}.muted{color:var(--muted)}.grid{display:grid;gap:16px}.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px}.kpi{min-height:122px;display:flex;justify-content:space-between;align-items:center}.kpi .label{font-weight:800;color:var(--muted)}.kpi .num{font-size:30px;font-weight:950;margin-top:8px;color:var(--brown)}.kpiIcon{width:58px;height:58px;border-radius:22px;display:grid;place-items:center;background:#fff3d6;font-size:28px}.section{margin-top:18px}.actions{display:flex;gap:12px;flex-wrap:wrap}.btn{border-radius:999px;padding:13px 18px;font-weight:950;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;box-shadow:0 10px 24px rgba(244,123,32,.25)}.btn.outline{background:#fff;color:var(--brown);border:1px solid var(--line);box-shadow:none}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.pill{border:1px solid var(--line);border-radius:999px;padding:10px 14px;background:#fff;color:var(--brown);font-weight:900}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}.field{width:100%;border:1px solid var(--line);border-radius:16px;background:#fff;padding:13px 14px;outline:0}.field:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(244,123,32,.13)}.formGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.full{grid-column:1/-1}.sizes{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.sizeField label{font-size:12px;font-weight:900;color:var(--muted)}.sizeField input{padding:10px;text-align:center}.photosPreview{display:flex;gap:8px;overflow:auto}.photosPreview img{width:82px;height:82px;border-radius:16px;object-fit:cover;border:1px solid var(--line)}.productGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}.prod{padding:0;overflow:hidden}.prodImg{height:168px;background:linear-gradient(135deg,#ffd6eb,#d6efff);display:grid;place-items:center;color:var(--brown);font-weight:900}.prodImg img{width:100%;height:100%;object-fit:cover}.prodBody{padding:14px}.prodTitle{font-weight:950;font-size:18px}.price{font-size:24px;color:#c96700;font-weight:950}.tags{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.tag{font-size:12px;padding:6px 9px;border-radius:999px;background:#fff5e5;border:1px solid var(--line);color:#7b4908;font-weight:900}.sizeDots{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}.dot{min-width:34px;height:34px;border-radius:999px;border:1px solid #bdebd2;color:#007a45;background:#effff5;display:grid;place-items:center;font-weight:900}.dot.off{color:#aaa;background:#f1f1f1;text-decoration:line-through}.catalogPublic{background:#fff;min-height:100vh}.publicTop{position:sticky;top:0;background:#fff;z-index:10;padding:14px 18px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:12px}.publicTop img{width:54px;height:54px;border-radius:16px}.publicTop h3{margin:0;color:var(--brown)}.publicHero{background:linear-gradient(135deg,#fff3d6,#ffe7ef);padding:26px;border-radius:28px;margin:14px 0;display:flex;align-items:center;justify-content:space-between;gap:15px}.publicHero h1{margin:0;color:var(--brown);font-size:34px}.publicFilters{display:flex;gap:8px;overflow:auto;padding-bottom:8px}.publicProducts{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.cartFloat{position:fixed;right:22px;bottom:24px;z-index:40;border-radius:999px;background:linear-gradient(135deg,#ffa31a,#c76700);color:#fff;font-weight:950;padding:16px 22px;box-shadow:0 14px 36px rgba(185,89,0,.3)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:grid;place-items:center;padding:20px}.modalBox{background:#fff;border-radius:28px;max-width:760px;width:100%;max-height:90vh;overflow:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.22)}.modalHead{display:flex;align-items:center;justify-content:space-between}.close{width:48px;height:48px;border-radius:16px;background:#f7f7f7;font-size:28px}.line{height:1px;background:#eee;margin:14px 0}.cartLine{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0}.bottomNav{display:none}.empty{padding:50px 20px;text-align:center;color:var(--muted);font-weight:800}.table{width:100%;border-collapse:separate;border-spacing:0 8px}.table th{text-align:left;color:var(--muted);font-size:12px}.table td{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:12px}.table td:first-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0}
@media (min-width:1100px){.content.withSide{margin-left:260px}.sidebar.desktop{transform:none;width:260px;top:0;padding-top:18px}.desktopOffset .top{margin-left:260px}.sidebar.desktop .brand img{width:66px;height:66px}.sidebar.desktop .navItem,.sidebar.desktop .navGroup{font-size:15px;padding:10px}.sidebar.desktop .sub{font-size:14px;padding:9px}.sidebar.desktop .brand h2{font-size:19px}}
@media (max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}.productGrid{grid-template-columns:repeat(2,1fr)}.publicProducts{grid-template-columns:repeat(2,1fr)}.formGrid{grid-template-columns:1fr}.h1{font-size:32px}.top{height:64px}.status{display:none}.searchTop{max-width:none}.content{padding:18px 14px 86px}.bottomNav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);height:72px;display:flex;justify-content:space-around;z-index:45}.bn{display:grid;place-items:center;color:#5e5e5e;font-size:12px;font-weight:800}.bn span{font-size:22px}.prodImg{height:132px}.prodTitle{font-size:15px}.price{font-size:20px}.prodBody{padding:10px}.btn{padding:12px 14px}.sizeDots .dot{min-width:30px;height:30px;font-size:13px}.publicHero{padding:18px}.publicHero h1{font-size:26px}.cartFloat{bottom:86px;right:16px}.modalBox{border-radius:24px;padding:20px}.sizes{grid-template-columns:repeat(4,1fr)}}

function shell(inner){return `<div class="app desktopOffset">${topbar()}${sidebar('desktop')}${side?`<div class="shade" onclick="side=false;render()"></div>${sidebar()}`:''}<main class="content withSide">${inner}</main>${bottom()}${state.cart.length?`<button class="cartFloat" onclick="openCart()">🛒 Carrinho ${state.cart.length}</button>`:''}</div>`}
function kpi(label,num,icon){return `<div class="card kpi"><div><div class="label">${label}</div><div class="num">${num}</div></div><div class="kpiIcon">${icon}</div></div>`}
function dashboard(){let salesToday=state.sales.reduce((a,s)=>a+s.total,0), stock=state.products.reduce((a,p)=>a+totalStock(p),0);return shell(`<div class="titleRow"><div><h1 class="h1">Dashboard</h1><div class="muted">Sistema profissional FamilyKids</div></div><button class="btn" onclick="openPublic()">Visualizar catálogo</button></div><div class="grid cards">${kpi('Vendas hoje',money(salesToday),'💰')}${kpi('Produtos cadastrados',state.products.length,'👕')}${kpi('Estoque total',stock,'📦')}${kpi('Estoque baixo',state.products.filter(p=>totalStock(p)<=Number(p.min||0)).length,'⚠️')}${kpi('Clientes cadastrados',state.clients.length,'👥')}${kpi('Ticket médio',money(state.sales.length?salesToday/state.sales.length:0),'🎟️')}${kpi('Previsão de entrada',money(salesToday),'↗️')}${kpi('Saldo previsto',money(salesToday),'🏦')}</div><div class="grid" style="grid-template-columns:2fr 1fr;margin-top:16px"><div class="card"><h2>Últimas vendas</h2>${state.sales.length?'<table class="table"><tr><th>Data</th><th>Itens</th><th>Total</th></tr>'+state.sales.slice(-5).map(s=>`<tr><td>${s.date}</td><td>${s.items.length}</td><td>${money(s.total)}</td></tr>`).join('')+'</table>':'<div class="empty">Nenhuma venda realizada ainda.</div>'}</div><div class="card"><h2>Alertas importantes</h2><p>⚠️ Estoque baixo: ${state.products.filter(p=>totalStock(p)<=Number(p.min||0)).length}</p><p>📷 Produtos sem foto: ${state.products.filter(p=>!p.photos?.length).length}</p><p>🏆 Top produtos: nenhum dado encontrado.</p></div></div>`) }
function productForm(){let stock=SIZES.map(s=>`<div class="sizeField"><label>${s}</label><input class="field" type="number" min="0" id="st_${s}" value="0"></div>`).join('');return `<div class="card"><h2>Novo produto</h2><div class="formGrid"><input id="p_name" class="field" placeholder="Nome do produto"><input id="p_code" class="field" placeholder="Código de barras / interno"><input id="p_cor" class="field" placeholder="Cor"><input id="p_supplier" class="field" placeholder="Fornecedor"><select id="p_cat" class="field"><option>Menino</option><option>Menina</option><option>Acessórios</option></select><select id="p_sub1" class="field"><option>Verão</option><option>Inverno</option></select><input id="p_sub2" class="field" placeholder="Subcategoria 2: Vestido, Conjunto..."><input id="p_cost" class="field" type="number" step="0.01" placeholder="Custo"><input id="p_price" class="field" type="number" step="0.01" placeholder="Preço de venda"><input id="p_min" class="field" type="number" placeholder="Estoque mínimo"><textarea id="p_obs" class="field full" placeholder="Observações"></textarea><div class="full"><label class="muted"><b>Fotos do produto</b> — selecione até 5 de uma vez</label><input id="p_photos" class="field" type="file" accept="image/*" multiple onchange="previewPhotos(this)"><div id="prev" class="photosPreview"></div></div><div class="full"><h3>Estoque por tamanho</h3><div class="sizes">${stock}</div></div></div><br><button class="btn" onclick="saveProduct()">Cadastrar produto</button></div>`}
async function filesToBase64(files){return Promise.all([...files].slice(0,5).map(f=>new Promise(res=>{let r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(f)})))}
async function previewPhotos(inp){let arr=await filesToBase64(inp.files);document.getElementById('prev').innerHTML=arr.map(x=>`<img src="${x}">`).join('')}
async function saveProduct(){let photos=await filesToBase64(document.getElementById('p_photos').files||[]);let stock={};SIZES.forEach(s=>stock[s]=+document.getElementById('st_'+s).value||0);let p={id:Date.now()+'',name:val('p_name')||'Produto sem nome',code:val('p_code'),cor:val('p_cor'),supplier:val('p_supplier'),category:val('p_cat'),sub1:val('p_sub1'),sub2:val('p_sub2')||'Produto',cost:+val('p_cost')||0,price:+val('p_price')||0,min:+val('p_min')||0,obs:val('p_obs'),stock,photos};state.products.push(p);save();alert('Produto cadastrado!');setPage('products')}
function val(id){return document.getElementById(id)?.value||''}
function productCard(p,internal=false){let sizes=SIZES.map(s=>`<span class="dot ${(p.stock||{})[s]>0?'':'off'}">${s}</span>`).join('');let img=p.photos?.[0]?`<img src="${p.photos[0]}">`:`<div>FamilyKids<br><small>Produto</small></div>`;return `<div class="card prod"><div class="prodImg">${img}</div><div class="prodBody"><div class="prodTitle">${p.name}</div><div class="tags"><span class="tag">${p.category||''}</span><span class="tag">${p.sub1||''}</span><span class="tag">${p.sub2||''}</span></div><div class="price">${money(p.price)}</div><div class="muted">${p.cor||''} • Ref. ${p.code||'s/código'}</div><div class="sizeDots">${sizes}</div><div class="actions"><button class="btn" onclick="addToCart('${p.id}')">Adicionar</button><button class="btn outline" onclick="viewProduct('${p.id}')">Ver</button>${internal?`<button class="btn outline" onclick="deleteProduct('${p.id}')">Excluir</button>`:''}</div></div></div>`}
function products(){return shell(`<div class="titleRow"><h1 class="h1">Produtos</h1><button class="btn" onclick="document.getElementById('formBox').classList.toggle('hidden')">Cadastrar novo</button></div><div class="toolbar"><input class="field" style="max-width:460px" placeholder="Pesquisar por produto, código ou descrição"><button class="pill">Status</button><button class="pill">Estoque</button><button class="pill">Grade</button><button class="pill">Cor</button><button class="pill">Tamanho</button></div><div class="grid cards">${kpi('Quantidade',state.products.length,'🛍️')}${kpi('Custo total',money(state.products.reduce((a,p)=>a+p.cost*totalStock(p),0)),'💲')}${kpi('Valor venda',money(state.products.reduce((a,p)=>a+p.price*totalStock(p),0)),'🏪')}</div><div id="formBox" class="section hidden">${productForm()}</div><div class="section productGrid">${state.products.map(p=>productCard(p,true)).join('')||'<div class="card empty">Nenhum produto cadastrado.</div>'}</div>`) }
function deleteProduct(id){if(confirm('Excluir produto?')){state.products=state.products.filter(p=>p.id!==id);save();render()}}
function getProd(id){return productsForCatalog().find(p=>p.id==id)||state.products.find(p=>p.id==id)}
function addToCart(id){let p=getProd(id);let s=availableSizes(p)[0]||'';state.cart.push({id:p.id,name:p.name,price:p.price,size:s,qty:1,cor:p.cor});save();render()}
function viewProduct(id){let p=getProd(id);let imgs=(p.photos?.length?p.photos:[null]).map((im,i)=>`<div class="prodImg" style="height:260px;border-radius:18px;margin:8px 0">${im?`<img src="${im}">`:'FamilyKids Produto'}</div>`).join('');showModal(`<div class="modalHead"><h2>${p.name}</h2><button class="close" onclick="closeModal()">×</button></div>${imgs}<div class="price">${money(p.price)}</div><div class="sizeDots">${SIZES.map(s=>`<span class="dot ${(p.stock||{})[s]>0?'':'off'}">${s}</span>`).join('')}</div><button class="btn" onclick="addToCart('${p.id}');closeModal()">Adicionar ao carrinho</button>`)}
function catalog(){return shell(`<div class="titleRow"><div><h1 class="h1">Catálogo</h1><div class="muted">Visual interno dos produtos. Use Visualizar Catálogo para abrir a vitrine do cliente.</div></div><button class="btn" onclick="openPublic()">👁️ Visualizar Catálogo</button></div><div class="toolbar"><select class="field" style="max-width:180px"><option>Todos</option><option>Menino</option><option>Menina</option><option>Acessórios</option></select><select class="field" style="max-width:180px"><option>Todas</option><option>Verão</option><option>Inverno</option></select><input class="field" style="max-width:360px" placeholder="Buscar produto..."></div><div class="productGrid">${productsForCatalog().map(p=>productCard(p,false)).join('')}</div>`) }
function publicCatalog(){let ps=productsForCatalog();return `<div class="catalogPublic"><div class="publicTop"><button class="iconBtn" style="background:#f5f5f5;color:#333" onclick="publicMode=false;render()">☰</button><img src="${state.company.logo||LOGO}"><div><h3>${state.company.name}</h3><div class="muted">Catálogo online</div></div><button class="iconBtn" style="margin-left:auto;background:#f5f5f5;color:#333" onclick="openCart()">🛒</button></div><main class="content"><div class="publicHero"><div><h1>Moda infantil com carinho</h1><div class="muted">Escolha os produtos e finalize pelo WhatsApp.</div></div><button class="btn green" onclick="openCart()">Enviar pedido</button></div><input class="field" placeholder="Pesquisar por..."><div class="publicFilters section"><button class="pill">Marca</button><button class="pill">Tamanho</button><button class="pill">Cor</button><button class="pill">Categoria</button><button class="pill">Subcategoria</button><button class="pill">Ordenar</button></div><div class="titleRow"><h1>Catálogo</h1><b>${ps.length} produtos</b></div><div class="publicProducts">${ps.map(p=>productCard(p,false)).join('')}</div><div class="card section"><h2>Informações da loja</h2><p>📍 ${state.company.address||''}</p><p>📱 WhatsApp: ${state.company.whatsapp||''}</p><p>📷 Instagram: ${state.company.instagram||''}</p><p>🕒 ${state.company.hours||''}</p></div></main>${state.cart.length?`<button class="cartFloat" onclick="openCart()">🛒 Carrinho ${state.cart.length}</button>`:''}</div>`}
function pdv(){return shell(`<div class="titleRow"><h1 class="h1">PDV</h1><button class="btn" onclick="finishSale()">Lançar venda - ${money(cartTotal())}</button></div><div class="card"><input class="field" id="barcode" placeholder="Pesquisar por descrição ou bipar código de barras" onkeydown="if(event.key==='Enter')scanCode(this.value)"><div class="muted" style="margin-top:10px">Leitor USB/Bluetooth: clique no campo e bipe o produto.</div></div><div class="grid" style="grid-template-columns:2fr 1fr;margin-top:16px"><div class="productGrid">${state.products.map(p=>productCard(p,false)).join('')||'<div class="empty card">Cadastre produtos para vender.</div>'}</div><div class="card"><h2>Carrinho do PDV</h2>${cartHtml()}<button class="btn" style="width:100%" onclick="finishSale()">Finalizar venda</button></div></div>`) }
function scanCode(code){let p=state.products.find(x=>x.code==code);if(p){addToCart(p.id);document.getElementById('barcode').value=''}else alert('Produto não encontrado')}
function cartTotal(){return state.cart.reduce((a,i)=>a+i.price*i.qty,0)}
function cartHtml(){return state.cart.length?state.cart.map((i,idx)=>`<div class="cartLine"><div><b>${i.name}</b><br><span class="muted">Tam. ${i.size||'-'} • ${money(i.price)}</span></div><div><button class="pill" onclick="state.cart[${idx}].qty=Math.max(1,state.cart[${idx}].qty-1);save();render()">-</button> ${i.qty} <button class="pill" onclick="state.cart[${idx}].qty++;save();render()">+</button></div></div>`).join('')+`<h2>Total: ${money(cartTotal())}</h2>`:'<div class="empty">Carrinho vazio.</div>'}
function openCart(){showModal(`<div class="modalHead"><h1>Carrinho</h1><button class="close" onclick="closeModal()">×</button></div>${cartHtml()}<div class="line"></div><button class="btn green" style="width:100%;font-size:20px" onclick="sendWhatsApp()">Enviar pedido no WhatsApp</button>`) }
function sendWhatsApp(){let txt=`Olá, FamilyKids! 💛\n\nGostaria de solicitar este pedido:\n\n`+state.cart.map(i=>`• ${i.name}\nTamanho: ${i.size||'-'}\nCor: ${i.cor||'-'}\nQtd: ${i.qty}\nValor: ${money(i.price*i.qty)}\n`).join('\n')+`\nTotal: ${money(cartTotal())}\n\nAguardo retorno para combinar pagamento e retirada/entrega.`;let phone=(state.company.whatsapp||'').replace(/\D/g,'');window.open(`https://wa.me/${phone}?text=${encodeURIComponent(txt)}`,'_blank')}
function finishSale(){if(!state.cart.length)return alert('Carrinho vazio');state.sales.push({date:new Date().toLocaleString('pt-BR'),items:[...state.cart],total:cartTotal()});state.cart=[];save();alert('Venda registrada!');render()}
function settings(){return shell(`<h1 class="h1">Configurações</h1><div class="card"><h2>Dados da empresa</h2><div class="formGrid"><input id="c_name" class="field" value="${state.company.name||''}" placeholder="Nome fantasia"><input id="c_whats" class="field" value="${state.company.whatsapp||''}" placeholder="WhatsApp"><input id="c_insta" class="field" value="${state.company.instagram||''}" placeholder="Instagram"><input id="c_hours" class="field" value="${state.company.hours||''}" placeholder="Horário"><input id="c_address" class="field full" value="${state.company.address||''}" placeholder="Endereço"><input id="c_pix" class="field" value="${state.company.pix||''}" placeholder="PIX"><input id="c_logo" class="field" type="file" accept="image/*" onchange="loadLogo(this)"></div><br><button class="btn" onclick="saveCompany()">Salvar configurações</button></div><div class="card section"><h2>Configuração do catálogo</h2><p>Logo, capa, link do catálogo, cores da loja, endereço e WhatsApp.</p><button class="btn outline" onclick="openPublic()">Acessar catálogo</button></div>`) }
async function loadLogo(inp){let a=await filesToBase64(inp.files); if(a[0]){state.company.logo=a[0];save();render()}}
function saveCompany(){state.company.name=val('c_name');state.company.whatsapp=val('c_whats');state.company.instagram=val('c_insta');state.company.hours=val('c_hours');state.company.address=val('c_address');state.company.pix=val('c_pix');save();alert('Configurações salvas!')}
function generic(title,body='Em construção controlada para a próxima etapa.'){return shell(`<h1 class="h1">${title}</h1><div class="card empty">${body}</div>`)}
function backup(){return shell(`<h1 class="h1">Backup</h1><div class="card"><button class="btn" onclick="downloadBackup()">Exportar backup</button> <label class="btn outline">Importar backup<input type="file" hidden onchange="importBackup(this)"></label></div>`)}
function downloadBackup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='backup-familykids-erp.json';a.click()}
function importBackup(inp){let r=new FileReader();r.onload=()=>{state=JSON.parse(r.result);save();render()};r.readAsText(inp.files[0])}
function showModal(html){document.body.insertAdjacentHTML('beforeend',`<div id="modal" class="modal"> <div class="modalBox">${html}</div></div>`)}function closeModal(){document.getElementById('modal')?.remove()}
function render(){let html= publicMode?publicCatalog(): page=='dashboard'?dashboard():page=='products'?products():page=='catalog'?catalog():page=='pdv'?pdv():page=='settings'?settings():page=='backup'?backup():page=='stock'?generic('Estoque','Movimentações, entradas, histórico e alertas de estoque.'):page=='sales'?generic('Vendas','Pedidos, devoluções, condicionais, cupons e comissões.'):page=='finance'?generic('Financeiro','Fluxo de caixa, contas a pagar, contas a receber e DRE.'):page=='reports'?generic('Relatórios','Mais vendidos, curva ABC, semáforo de vendas e pesquisa de vendas.'):page=='printers'?generic('Impressoras','Cupom térmico, etiquetas, USB, Bluetooth e PDF.'):page=='users'?generic('Usuários','Administrador, gerente, vendedor, caixa e estoquista.'):page=='categories'?generic('Categorias','Menino, Menina, Acessórios, Verão, Inverno e tipos de peças editáveis.'):page=='clients'?generic('Clientes','Cadastro de clientes e histórico de compras.'):generic('FamilyKids ERP');document.getElementById('root').innerHTML=html}
render();
</script></body></html>
