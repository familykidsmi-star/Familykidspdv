<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FamilyKids V16.6 Catálogo Premium</title>
<style>
:root{--orange:#ff8a3d;--orange2:#ffc07a;--blue:#53c7ee;--green:#41c66b;--pink:#ff8fb8;--ink:#222;--muted:#72727b;--line:#ececf0;--bg:#fafafa;--card:#fff;--shadow:0 12px 34px rgba(0,0,0,.08)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{cursor:pointer;border:0}.hidden{display:none!important}.muted{color:var(--muted)}
.top-msg{background:#fff7ef;text-align:center;padding:8px 12px;font-size:12px;font-weight:700;color:#8a4b10}.topbar{position:sticky;top:0;z-index:20;background:#fff;display:flex;align-items:center;gap:12px;padding:12px 18px;box-shadow:0 2px 12px rgba(0,0,0,.08)}.logo{width:58px;height:58px;border-radius:19px;background:linear-gradient(135deg,var(--orange),var(--orange2));display:grid;place-items:center;color:#fff;font-weight:950;box-shadow:var(--shadow);overflow:hidden}.logo img{width:100%;height:100%;object-fit:cover}.search{flex:1;border:1px solid var(--line);border-radius:28px;padding:14px 18px}.iconbar{display:flex;gap:10px}.icon{background:#f5f5f7;border-radius:14px;padding:11px 12px}.btn{border-radius:14px;padding:12px 16px;background:#fff;border:1px solid var(--line);font-weight:850}.btn-dark{background:#111;color:#fff;border-color:#111}.btn-primary{background:linear-gradient(135deg,var(--orange),#ff9a48);color:#fff;border-color:transparent}.btn-danger{background:#ffe6e6;color:#b30000;border-color:#ffd2d2}.btn-green{background:#eafff0;color:#087a38;border-color:#b8f1c9}.cats{display:flex;overflow:auto;gap:10px;padding:12px 16px;background:#fff;scrollbar-width:none}.cats button{white-space:nowrap;padding:10px 18px;border-radius:22px;background:#f2f4f7;font-weight:850}.cats button.active{background:#111;color:#fff}.hero{margin:16px;border-radius:32px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;background:linear-gradient(135deg,#fff4ea,#eef8ff);box-shadow:var(--shadow)}.copy{padding:44px}.copy small{background:#fff;padding:8px 14px;border-radius:999px;font-weight:850}.copy h1{font-size:clamp(32px,5vw,56px);line-height:1.02;margin:18px 0 10px;letter-spacing:-1.8px}.copy p{color:#555;line-height:1.55}.visual{display:grid;place-items:center;min-height:340px;background:radial-gradient(circle at 30% 20%,#fff 0 10%,transparent 11%),radial-gradient(circle,#ffd4a7,#ff8a3d)}.brand-card{background:#fff;padding:30px;border-radius:28px;box-shadow:0 18px 55px rgba(0,0,0,.13);text-align:center;font-weight:950}.campaigns{display:flex;overflow:auto;gap:12px;padding:0 16px 16px}.campaign{min-width:260px;padding:18px;border-radius:20px;background:#fff;box-shadow:var(--shadow);font-weight:900}.section{padding:0 16px 24px}.section h2{margin:12px 0 14px;font-size:26px}.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 5px 20px rgba(0,0,0,.06)}.img{aspect-ratio:1;background:linear-gradient(#fff6eb,#edf8ff);display:grid;place-items:center;font-size:46px;position:relative}.badge{position:absolute;left:10px;top:10px;background:var(--orange);color:#fff;padding:5px 8px;border-radius:999px;font-size:11px;font-weight:900}.heart{position:absolute;right:10px;top:10px;background:#fff;border-radius:50%;width:34px;height:34px;display:grid;place-items:center}.info{padding:14px}.info b{display:block;min-height:40px}.price{font-size:23px;font-weight:950;margin-top:8px}.pix{color:#0a8a43;font-size:13px;font-weight:850}.sizes{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0}.sizes span{font-size:11px;border:1px solid var(--line);border-radius:8px;padding:4px 6px;background:#fafafa}.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;justify-content:space-around;padding:10px;box-shadow:0 -2px 12px rgba(0,0,0,.1);z-index:20}.bottom button{background:transparent;font-size:12px;display:grid;gap:2px;color:#333}.wa{position:fixed;right:18px;bottom:78px;width:58px;height:58px;border-radius:50%;background:#25D366;color:#fff;display:grid;place-items:center;font-size:28px;box-shadow:0 14px 34px rgba(37,211,102,.35);z-index:21}.admin-float{position:fixed;left:18px;bottom:78px;z-index:21}.panel{max-width:1200px;margin:16px auto 90px;padding:0 16px}.admin-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:20px 0}.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.admin-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:var(--shadow)}.row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:16px;margin:8px 0;background:#fff}.row.off{opacity:.55;background:#fafafa}.row small{display:block;color:var(--muted);margin-top:4px}.tools{display:flex;gap:8px;flex-wrap:wrap}.field{margin:10px 0}.field label{font-size:12px;font-weight:900;color:#555;display:block;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111;color:#fff;border-radius:999px;padding:12px 16px;z-index:99;font-weight:850}.empty{background:#fff;border-radius:20px;text-align:center;padding:32px;color:var(--muted);border:1px dashed #ddd}
@media(max-width:768px){.hero{grid-template-columns:1fr;border-radius:24px}.copy{padding:24px}.visual{min-height:220px}.products{grid-template-columns:repeat(2,1fr);gap:12px}.topbar{padding:10px 12px}.logo{width:50px;height:50px}.iconbar .icon:nth-child(2){display:none}.admin-grid{grid-template-columns:1fr}.campaign{min-width:230px}.info{padding:11px}.price{font-size:20px}.bottom{display:flex}}
</style>
</head>
<body>
<div id="catalogView">
  <div class="top-msg">🚚 Frete • 💳 Parcelamento • 📲 Atendimento WhatsApp</div>
  <header class="topbar"><div class="logo" id="logoBox">FK</div><input class="search" placeholder="Pesquisar produtos, tamanhos e categorias" oninput="state.search=this.value;renderCatalog()"><div class="iconbar"><button class="icon">♡</button><button class="icon">👤</button><button class="icon">🛒</button></div></header>
  <nav class="cats" id="catBar"></nav>
  <section class="hero"><div class="copy"><small id="heroTag"></small><h1 id="heroTitle"></h1><p id="heroSub"></p><button class="btn btn-dark" id="heroBtn"></button></div><div class="visual"><div class="brand-card">FAMILYKIDS<br><span style="font-size:14px;color:#777">Moda Infantil</span></div></div></section>
  <div class="campaigns" id="campaigns"></div>
  <section class="section"><h2 id="sectionTitle">Novidades</h2><div class="products" id="products"></div></section>
  <div style="height:80px"></div><a class="wa" href="#">☏</a><button class="btn btn-primary admin-float" onclick="openAdmin()">⚙ Retaguarda</button>
  <nav class="bottom"><button>🏠<span>Início</span></button><button onclick="scrollCats()">📂<span>Categorias</span></button><button>❤️<span>Favoritos</span></button><button>👤<span>Conta</span></button><button>🛒<span>Carrinho</span></button></nav>
</div>
<div id="adminView" class="hidden panel">
  <div class="admin-head"><div><h1>Retaguarda do Catálogo</h1><p class="muted">Crie, edite, oculte, exclua e ordene categorias/subcategorias sem mexer no restante do ERP.</p></div><button class="btn btn-dark" onclick="closeAdmin()">Ver catálogo</button></div>
  <div class="admin-grid">
    <div class="admin-card"><h2>Categorias</h2><div id="adminCats"></div><hr><h3>Nova categoria</h3><div class="field"><label>Nome</label><input id="newCatName" placeholder="Ex.: Festas"></div><button class="btn btn-primary" onclick="addCategory()">Criar categoria</button></div>
    <div class="admin-card"><h2>Subcategorias</h2><div class="field"><label>Categoria vinculada</label><select id="subCatParent"></select></div><div id="adminSubs"></div><hr><h3>Nova subcategoria</h3><div class="field"><label>Nome</label><input id="newSubName" placeholder="Ex.: Vestidos"></div><button class="btn btn-primary" onclick="addSubcategory()">Criar subcategoria</button></div>
    <div class="admin-card"><h2>Banner editável</h2><div class="field"><label>Etiqueta</label><input id="cfgTag"></div><div class="field"><label>Título</label><input id="cfgTitle"></div><div class="field"><label>Subtítulo</label><textarea id="cfgSub"></textarea></div><div class="field"><label>Botão</label><input id="cfgBtn"></div><button class="btn btn-primary" onclick="saveBanner()">Salvar banner</button></div>
    <div class="admin-card"><h2>Campanhas</h2><div id="adminCampaigns"></div><div class="field"><label>Nova campanha</label><input id="newCampaign" placeholder="Ex.: Volta às aulas"></div><button class="btn btn-primary" onclick="addCampaign()">Criar campanha</button></div>
  </div>
</div>
<script>
const LS='familykids_catalog_v166';
let state=JSON.parse(localStorage.getItem(LS)||'null')||{activeCat:'Todos',search:'',banner:{tag:'Banner editável',title:'Looks infantis escolhidos com carinho',sub:'Texto do banner totalmente editável. Preparado para campanhas rotativas.',btn:'Comprar agora'},categories:[{id:'todos',name:'Todos',visible:true,order:0},{id:'meninas',name:'Meninas',visible:true,order:1},{id:'meninos',name:'Meninos',visible:true,order:2},{id:'bebes',name:'Bebês',visible:true,order:3},{id:'acessorios',name:'Acessórios',visible:true,order:4},{id:'promocoes',name:'Promoções',visible:true,order:5},{id:'lancamentos',name:'Lançamentos',visible:true,order:6}],subcategories:[{id:'vestidos',parent:'meninas',name:'Vestidos',visible:true},{id:'conjuntos',parent:'meninos',name:'Conjuntos',visible:true},{id:'lacos',parent:'acessorios',name:'Laços',visible:true}],campaigns:[{name:'❄️ Campanha Inverno',visible:true},{name:'🔥 Liquidação',visible:true},{name:'✨ Lançamentos',visible:true},{name:'🤖 Escolhas da IA',visible:true}],products:[{name:'Vestido Floral Premium',cat:'meninas',price:109.9,sizes:['4','6','8'],tag:'NOVO'},{name:'Conjunto Dino Moletom',cat:'meninos',price:129.9,sizes:['4','6','8'],tag:'NOVO'},{name:'Jaqueta Kids Premium',cat:'meninas',price:219.9,sizes:['8','10','12'],tag:'PREMIUM'},{name:'Laço Boutique',cat:'acessorios',price:24.9,sizes:['Único'],tag:'PROMO'}]};
function save(){localStorage.setItem(LS,JSON.stringify(state))}function money(v){return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}function toast(t){let d=document.createElement('div');d.className='toast';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),1800)}
function renderCatalog(){document.getElementById('heroTag').textContent=state.banner.tag;document.getElementById('heroTitle').textContent=state.banner.title;document.getElementById('heroSub').textContent=state.banner.sub;document.getElementById('heroBtn').textContent=state.banner.btn;let cats=state.categories.filter(c=>c.visible).sort((a,b)=>a.order-b.order);if(!cats.find(c=>c.name==state.activeCat))state.activeCat='Todos';document.getElementById('catBar').innerHTML=cats.map(c=>`<button class="${state.activeCat==c.name?'active':''}" onclick="state.activeCat='${c.name}';renderCatalog()">${c.name}</button>`).join('');document.getElementById('campaigns').innerHTML=state.campaigns.filter(c=>c.visible).map(c=>`<div class="campaign">${c.name}</div>`).join('');let active=cats.find(c=>c.name==state.activeCat);let list=state.products.filter(p=>(state.activeCat=='Todos'||p.cat==active?.id)&&(!state.search||p.name.toLowerCase().includes(state.search.toLowerCase())));document.getElementById('sectionTitle').textContent=state.activeCat=='Todos'?'Novidades':state.activeCat;if(!list.length){document.getElementById('products').innerHTML='<div class="empty">Nenhum produto encontrado.</div>';return}document.getElementById('products').innerHTML=list.map(p=>`<article class="card"><div class="img"><span class="badge">${p.tag}</span><span class="heart">♡</span>👕</div><div class="info"><b>${p.name}</b><div class="price">${money(p.price)}</div><div class="pix">PIX ${money(p.price*.95)}</div><div class="sizes">${p.sizes.map(s=>`<span>${s}</span>`).join('')}</div><button class="btn btn-dark" style="width:100%">Escolher tamanho</button></div></article>`).join('')}
function openAdmin(){document.getElementById('catalogView').classList.add('hidden');document.getElementById('adminView').classList.remove('hidden');renderAdmin()}function closeAdmin(){document.getElementById('adminView').classList.add('hidden');document.getElementById('catalogView').classList.remove('hidden');renderCatalog()}function scrollCats(){document.getElementById('catBar').scrollIntoView({behavior:'smooth'})}
function renderAdmin(){document.getElementById('cfgTag').value=state.banner.tag;document.getElementById('cfgTitle').value=state.banner.title;document.getElementById('cfgSub').value=state.banner.sub;document.getElementById('cfgBtn').value=state.banner.btn;document.getElementById('adminCats').innerHTML=state.categories.sort((a,b)=>a.order-b.order).map((c,i)=>`<div class="row ${!c.visible?'off':''}"><div><b>${c.name}</b><small>${c.visible?'Visível no catálogo':'Oculta para o cliente'} • ordem ${c.order}</small></div><div class="tools"><button class="btn" onclick="renameCat('${c.id}')">Editar</button><button class="btn ${c.visible?'btn-danger':'btn-green'}" onclick="toggleCat('${c.id}')">${c.visible?'Ocultar':'Exibir'}</button><button class="btn" onclick="moveCat('${c.id}',-1)">↑</button><button class="btn" onclick="moveCat('${c.id}',1)">↓</button>${c.id!='todos'?`<button class="btn btn-danger" onclick="deleteCat('${c.id}')">Excluir</button>`:''}</div></div>`).join('');document.getElementById('subCatParent').innerHTML=state.categories.filter(c=>c.id!='todos').map(c=>`<option value="${c.id}">${c.name}</option>`).join('');document.getElementById('adminSubs').innerHTML=state.subcategories.map(s=>`<div class="row ${!s.visible?'off':''}"><div><b>${s.name}</b><small>Categoria: ${state.categories.find(c=>c.id==s.parent)?.name||'-'} • ${s.visible?'Visível':'Oculta'}</small></div><div class="tools"><button class="btn" onclick="renameSub('${s.id}')">Editar</button><button class="btn ${s.visible?'btn-danger':'btn-green'}" onclick="toggleSub('${s.id}')">${s.visible?'Ocultar':'Exibir'}</button><button class="btn btn-danger" onclick="deleteSub('${s.id}')">Excluir</button></div></div>`).join('');document.getElementById('adminCampaigns').innerHTML=state.campaigns.map((c,i)=>`<div class="row ${!c.visible?'off':''}"><div><b>${c.name}</b><small>${c.visible?'Visível':'Oculta'}</small></div><div class="tools"><button class="btn" onclick="renameCampaign(${i})">Editar</button><button class="btn ${c.visible?'btn-danger':'btn-green'}" onclick="toggleCampaign(${i})">${c.visible?'Ocultar':'Exibir'}</button><button class="btn btn-danger" onclick="deleteCampaign(${i})">Excluir</button></div></div>`).join('')}
function addCategory(){let n=document.getElementById('newCatName').value.trim();if(!n)return;state.categories.push({id:n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_'),name:n,visible:true,order:state.categories.length});document.getElementById('newCatName').value='';save();renderAdmin();toast('Categoria criada')}function renameCat(id){let c=state.categories.find(x=>x.id==id);let n=prompt('Novo nome',c.name);if(n){c.name=n;save();renderAdmin()}}function toggleCat(id){let c=state.categories.find(x=>x.id==id);c.visible=!c.visible;save();renderAdmin()}function moveCat(id,d){let c=state.categories.find(x=>x.id==id);c.order+=d;state.categories.forEach((x,i)=>{if(x.id!=id&&x.order==c.order)x.order-=d});save();renderAdmin()}function deleteCat(id){if(confirm('Excluir categoria? Produtos não serão apagados.')){state.categories=state.categories.filter(c=>c.id!=id);state.subcategories=state.subcategories.filter(s=>s.parent!=id);save();renderAdmin()}}
function addSubcategory(){let n=document.getElementById('newSubName').value.trim(),p=document.getElementById('subCatParent').value;if(!n)return;state.subcategories.push({id:n.toLowerCase().replace(/[^a-z0-9]+/g,'_'),parent:p,name:n,visible:true});document.getElementById('newSubName').value='';save();renderAdmin();toast('Subcategoria criada')}function renameSub(id){let s=state.subcategories.find(x=>x.id==id);let n=prompt('Novo nome',s.name);if(n){s.name=n;save();renderAdmin()}}function toggleSub(id){let s=state.subcategories.find(x=>x.id==id);s.visible=!s.visible;save();renderAdmin()}function deleteSub(id){if(confirm('Excluir subcategoria?')){state.subcategories=state.subcategories.filter(s=>s.id!=id);save();renderAdmin()}}
function saveBanner(){state.banner={tag:cfgTag.value,title:cfgTitle.value,sub:cfgSub.value,btn:cfgBtn.value};save();toast('Banner salvo')}function addCampaign(){let n=document.getElementById('newCampaign').value.trim();if(!n)return;state.campaigns.push({name:n,visible:true});document.getElementById('newCampaign').value='';save();renderAdmin()}function renameCampaign(i){let n=prompt('Novo nome',state.campaigns[i].name);if(n){state.campaigns[i].name=n;save();renderAdmin()}}function toggleCampaign(i){state.campaigns[i].visible=!state.campaigns[i].visible;save();renderAdmin()}function deleteCampaign(i){if(confirm('Excluir campanha?')){state.campaigns.splice(i,1);save();renderAdmin()}}
renderCatalog();
</script>
</body></html>
