let state=load(); let pageName='dashboard'; let publicMode=false;

function load(){try{return {...structuredClone(DEFAULT),...(JSON.parse(localStorage.getItem('fk_erp_v5')||'{}'))}}catch(e){return structuredClone(DEFAULT)}}
function save(){localStorage.setItem('fk_erp_v5',JSON.stringify(state)); renderMini(); updateCart()}
function money(v){return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2300)}

function totals(){let today=new Date().toISOString().slice(0,10);let m=new Date().toISOString().slice(0,7);let salesToday=state.sales.filter(s=>s.date.slice(0,10)==today);let salesMonth=state.sales.filter(s=>s.date.slice(0,7)==m);return {today:salesToday.reduce((a,s)=>a+s.total,0),month:salesMonth.reduce((a,s)=>a+s.total,0),stock:state.products.reduce((a,p)=>a+Object.values(p.stock||{}).reduce((x,y)=>x+(+y||0),0),0),low:state.products.filter(p=>Object.values(p.stock||{}).reduce((x,y)=>x+(+y||0),0)<=(+p.min||0)).length}}
function dashboard(){let t=totals();page.innerHTML=`<div class="hero"><div><h2>Dashboard</h2><p>Bem-vindo ao FamilyKids ERP 👋</p></div><div class="datepill">📅 Hoje, ${new Date().toLocaleDateString('pt-BR')}</div></div><div class="grid stats"><div class="card stat"><div class="label">Vendas hoje</div><div class="value">${money(t.today)}</div><small>${state.sales.filter(s=>s.date.slice(0,10)==new Date().toISOString().slice(0,10)).length} pedidos</small><div class="bubble b1">🛍️</div></div><div class="card stat"><div class="label">Vendas do mês</div><div class="value">${money(t.month)}</div><small>${state.sales.length} vendas no histórico</small><div class="bubble b2">📈</div></div><div class="card stat"><div class="label">Produtos cadastrados</div><div class="value">${state.products.length}</div><small>Total de produtos</small><div class="bubble b2">👕</div></div><div class="card stat"><div class="label">Estoque total</div><div class="value">${t.stock}</div><small>Peças em estoque</small><div class="bubble b3">📦</div></div></div><div class="grid columns"><div><div class="card"><div class="section-title"><h3>Últimas vendas</h3><button class="ghost-btn" onclick="openPage('vendas')">Ver todas</button></div>${salesTable(state.sales.slice(-5).reverse())}</div><div class="catalog-banner"><div><h2>Catálogo Online</h2><p>Mostre seus produtos para seus clientes com carrinho e WhatsApp.</p><p>✅ Catálogo profissional e responsivo<br>✅ Fotos e tamanhos disponíveis<br>✅ Pedido direto no WhatsApp</p></div><div><button class="orange-btn" style="width:100%;font-size:18px" onclick="openPublicCatalog()">Visualizar Catálogo ↗</button></div></div></div><div class="grid"><div class="card"><h3>Alertas importantes</h3><p>⚠️ Estoque baixo: <b>${t.low}</b> produtos</p><p>📸 Produtos sem foto: <b>${state.products.filter(p=>!p.photos?.[0]).length}</b></p></div><div class="card quick"><h3>Ações rápidas</h3><button class="orange-btn" onclick="openProductForm()">➕ Novo produto</button><button class="green-btn" onclick="openPage('pdv')">🛒 Nova venda (PDV)</button><button class="blue-btn" onclick="openPublicCatalog()">👁️ Visualizar catálogo</button></div></div></div>`}
function salesTable(arr){if(!arr.length)return `<div class="empty">Nenhuma venda realizada ainda.</div>`;return `<table class="table"><tr><th>Data</th><th>Itens</th><th>Pagamento</th><th>Total</th></tr>${arr.map(s=>`<tr><td>${new Date(s.date).toLocaleString('pt-BR')}</td><td>${s.items.length}</td><td>${s.pay}</td><td>${money(s.total)}</td></tr>`).join('')}</table>`}
function productTotal(p){return Object.values(p.stock||{}).reduce((a,b)=>a+(+b||0),0)}
function availableSizes(p){return sizes.filter(s=>(+((p.stock||{})[s])||0)>0)}
function placeholder(cat=''){let bg=cat=='Menina'?'#ffd8ec':cat=='Menino'?'#dff0ff':'#e7ffe9';return `data:image/svg+xml;utf8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="600" height="500"><rect width="100%" height="100%" fill="${bg}"/><text x="50%" y="42%" dominant-baseline="middle" text-anchor="middle" font-family="Arial" font-size="46" fill="#d36300">FamilyKids</text><text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Arial" font-size="26" fill="#666">Produto</text></svg>`)}`}
function productCard(p,admin=false){let photo=p.photos?.[0]||placeholder(p.cat);let av=availableSizes(p);return `<div class="product-card"><img src="${photo}" onclick="openProductView('${p.id}')"><h3>${p.name}</h3><div class="chips"><span class="chip">${p.cat}</span><span class="chip">${p.sub1}</span><span class="chip">${p.sub2}</span></div><div class="price">${money(p.price)}</div><p style="color:#6b7280;margin:5px 0">${p.color||'Cor não informada'} • Ref. ${p.code||p.barcode||'s/código'}</p><div class="chips">${sizes.map(s=>`<span class="chip size-chip ${av.includes(s)?'':'off'}">${s}</span>`).join('')}</div><div style="display:flex;gap:8px;margin-top:12px"><button class="orange-btn" style="flex:1" onclick="addToCart('${p.id}')">Adicionar</button>${admin?`<button class="ghost-btn" onclick="openProductForm('${p.id}')">Editar</button><button class="danger-btn" onclick="delProduct('${p.id}')">Excluir</button>`:`<button class="ghost-btn" onclick="openProductView('${p.id}')">Ver</button>`}</div></div>`}
function produtos(){page.innerHTML=`<div class="section-title"><div><h2>Produtos</h2><p>Cadastro profissional com categorias, código de barras, estoque por tamanho e até 5 fotos.</p></div><button class="orange-btn" onclick="openProductForm()">➕ Novo produto</button></div><div class="card" style="margin-bottom:14px"><div class="scanner"><b>Leitor de código de barras</b><p>Para usar bipador USB/Bluetooth, clique no campo Código de barras no cadastro ou no campo de busca do PDV e faça a leitura. O leitor funciona como teclado.</p></div></div><div class="products-grid">${state.products.map(p=>productCard(p,true)).join('')||'<div class="card empty">Nenhum produto cadastrado ainda.</div>'}</div>`}
function fileToDataURL(file){return new Promise(res=>{if(!file)return res('');let r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(file)})}
function openProductForm(id){let p=id?state.products.find(x=>x.id==id):{id:uid(),name:'',code:'',barcode:'',brand:'',supplier:'',cat:state.cats[0],sub1:state.sub1[0],sub2:state.sub2[0],color:'',cost:'',price:'',promo:'',min:1,obs:'',stock:{},photos:[]};modalContent.innerHTML=`<div class="modal-head"><h2>${id?'Editar':'Novo'} produto</h2><button class="x" onclick="closeModal()">✕</button></div><form id="prodForm" class="forms"><div class="field col-3"><label>Código interno</label><input name="code" value="${p.code||''}" placeholder="Automático se vazio"></div><div class="field col-3"><label>Código de barras / bipador</label><input name="barcode" value="${p.barcode||''}" autofocus placeholder="Bipe ou digite"></div><div class="field col-6"><label>Nome/descrição</label><input name="name" required value="${p.name||''}" placeholder="Ex: Vestido Floral"></div><div class="field col-3"><label>Categoria</label><select name="cat">${state.cats.map(x=>`<option ${p.cat==x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field col-3"><label>Subcategoria 1</label><select name="sub1">${state.sub1.map(x=>`<option ${p.sub1==x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field col-3"><label>Subcategoria 2</label><select name="sub2">${state.sub2.map(x=>`<option ${p.sub2==x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field col-3"><label>Cor</label><input name="color" value="${p.color||''}" placeholder="Rosa, azul..."></div><div class="field col-3"><label>Marca</label><input name="brand" value="${p.brand||''}"></div><div class="field col-3"><label>Fornecedor</label><input name="supplier" value="${p.supplier||''}"></div><div class="field col-2"><label>Custo</label><input name="cost" type="number" step="0.01" value="${p.cost||''}"></div><div class="field col-2"><label>Venda</label><input name="price" required type="number" step="0.01" value="${p.price||''}"></div><div class="field col-2"><label>Promoção</label><input name="promo" type="number" step="0.01" value="${p.promo||''}"></div><div class="field col-12"><label>Estoque por tamanho</label><div class="sizes">${sizes.map(s=>`<input name="stk_${s}" type="number" min="0" value="${p.stock?.[s]||0}" placeholder="${s}" title="${s}">`).join('')}</div><small>Grade é controle interno. No catálogo o cliente verá apenas os tamanhos disponíveis.</small></div><div class="field col-12"><label>Fotos do produto (até 5)</label><div class="photo-upload"><input type="file" accept="image/*" name="photos" multiple onchange="previewFiles(this)"><small>Selecione até 5 fotos de uma vez. A primeira será a foto principal do produto.</small></div><div class="photo-grid">${[0,1,2,3,4].map(i=>`<div class="photo-box"><img id="prev${i}" src="${p.photos?.[i]||placeholder(p.cat)}"><small>${i==0?'Principal':'Foto '+(i+1)}</small></div>`).join('')}</div></div><div class="field col-12"><label>Observações</label><textarea name="obs">${p.obs||''}</textarea></div><div class="col-12" style="display:flex;gap:10px;justify-content:flex-end"><button type="button" class="ghost-btn" onclick="closeModal()">Cancelar</button><button class="orange-btn">Salvar produto</button></div></form>`;modal.classList.add('show');document.getElementById('prodForm').onsubmit=async e=>{e.preventDefault();let f=new FormData(e.target);let obj={...p};['code','barcode','name','cat','sub1','sub2','color','brand','supplier','cost','price','promo','min','obs'].forEach(k=>obj[k]=f.get(k)||'');obj.code=obj.code||('FK'+String(state.products.length+1).padStart(4,'0'));obj.stock={};sizes.forEach(s=>obj.stock[s]=Number(f.get('stk_'+s)||0));let selected=f.getAll('photos').filter(file=>file&&file.size).slice(0,5);if(selected.length){obj.photos=[];for(let file of selected){obj.photos.push(await fileToDataURL(file))}}else{obj.photos=obj.photos||[]};let ix=state.products.findIndex(x=>x.id==obj.id);if(ix>=0)state.products[ix]=obj;else state.products.push(obj);save();closeModal();produtos();showToast('Produto salvo com sucesso!')}}
function previewFile(inp,id){let f=inp.files[0];if(!f)return;let r=new FileReader();r.onload=()=>document.getElementById(id).src=r.result;r.readAsDataURL(f)}
function previewFiles(inp){let files=[...(inp.files||[])].slice(0,5);for(let i=0;i<5;i++){let img=document.getElementById('prev'+i);if(!img)continue;if(files[i]){let r=new FileReader();r.onload=()=>img.src=r.result;r.readAsDataURL(files[i])}}if((inp.files||[]).length>5)showToast('Usei as 5 primeiras fotos selecionadas.')}
function delProduct(id){if(confirm('Excluir produto?')){state.products=state.products.filter(p=>p.id!=id);save();produtos()}}
function openProductView(id){let p=state.products.find(x=>x.id==id);if(!p)return;let photos=(p.photos||[]).filter(Boolean);if(!photos.length)photos=[placeholder(p.cat)];modalContent.innerHTML=`<div class="modal-head"><h2>${p.name}</h2><button class="x" onclick="closeModal()">✕</button></div><div class="gallery"><div class="thumbs">${photos.map((ph,i)=>`<img src="${ph}" class="${i==0?'active':''}" onclick="mainPhoto.src=this.src;document.querySelectorAll('.thumbs img').forEach(x=>x.classList.remove('active'));this.classList.add('active')">`).join('')}</div><div><img id="mainPhoto" class="main-photo" src="${photos[0]}"></div></div><div style="margin-top:14px"><div class="price">${money(p.promo||p.price)}</div><p>${p.cat} • ${p.sub1} • ${p.sub2} • ${p.color||''}</p><b>Tamanhos disponíveis:</b><div class="chips" style="margin:8px 0">${sizes.map(s=>`<span class="chip size-chip ${(+p.stock?.[s]||0)>0?'':'off'}">${s}</span>`).join('')}</div><button class="orange-btn" onclick="addToCart('${p.id}');closeModal()">Adicionar ao carrinho</button></div>`;modal.classList.add('show')}
function closeModal(){modal.classList.remove('show')}
function catalogo(){page.innerHTML=`<div class="section-title"><div><h2>Catálogo</h2><p>Visual interno dos produtos. Use "Visualizar Catálogo" para abrir a vitrine do cliente.</p></div><button class="orange-btn" onclick="openPublicCatalog()">👁️ Visualizar Catálogo</button></div>${filtersHTML()}<div class="products-grid" id="catGrid"></div>`;renderProductGrid('catGrid',false)}
function filtersHTML(){return `<div class="filters"><select id="fcat" onchange="renderProductGrid('catGrid',false)"><option>Todos</option>${state.cats.map(x=>`<option>${x}</option>`).join('')}</select><select id="fsub1" onchange="renderProductGrid('catGrid',false)"><option>Todos</option>${state.sub1.map(x=>`<option>${x}</option>`).join('')}</select><select id="fsub2" onchange="renderProductGrid('catGrid',false)"><option>Todos</option>${state.sub2.map(x=>`<option>${x}</option>`).join('')}</select><input id="fq" oninput="renderProductGrid('catGrid',false)" placeholder="Buscar..."></div>`}
function filtered(){let c=document.getElementById('fcat')?.value||'Todos',s1=document.getElementById('fsub1')?.value||'Todos',s2=document.getElementById('fsub2')?.value||'Todos',q=(document.getElementById('fq')?.value||'').toLowerCase();return state.products.filter(p=>(c=='Todos'||p.cat==c)&&(s1=='Todos'||p.sub1==s1)&&(s2=='Todos'||p.sub2==s2)&&(!q||JSON.stringify(p).toLowerCase().includes(q)))}
function renderProductGrid(id,admin=false){let arr=filtered();document.getElementById(id).innerHTML=arr.map(p=>productCard(p,admin)).join('')||'<div class="card empty">Nenhum produto encontrado. Cadastre produtos ou visualize produtos demonstrativos no catálogo público.</div>'}
function pdv(){page.innerHTML=`<div class="section-title"><div><h2>PDV</h2><p>Frente de caixa com busca, bipador e baixa automática de estoque.</p></div></div><div class="pos"><div class="card"><div class="field"><label>Buscar / bipar código de barras</label><input id="pdvSearch" class="pdv-search" placeholder="Digite, busque ou bipe o produto" oninput="pdvResults()"></div><div id="pdvResults" class="products-grid" style="margin-top:14px"></div></div><div class="card"><h3>Carrinho da venda</h3><div id="cartLines"></div><div class="field"><label>Forma de pagamento</label><select id="pay"><option>PIX</option><option>Dinheiro</option><option>Débito</option><option>Crédito</option><option>Crediário</option></select></div><div class="total-box">Total<br><strong id="pdvTotal">R$ 0,00</strong></div><button class="green-btn" style="width:100%;margin-top:12px" onclick="finishSale()">Finalizar venda</button></div></div>`;pdvResults();renderCartLines()}
function pdvResults(){let q=(document.getElementById('pdvSearch')?.value||'').toLowerCase();let arr=state.products.filter(p=>!q||p.name.toLowerCase().includes(q)||(p.code||'').toLowerCase().includes(q)||(p.barcode||'').toLowerCase().includes(q));if(q&&arr.length==1&&((arr[0].barcode||'').toLowerCase()==q||(arr[0].code||'').toLowerCase()==q)){addToCart(arr[0].id);document.getElementById('pdvSearch').value=''}document.getElementById('pdvResults').innerHTML=arr.slice(0,8).map(p=>productCard(p,false)).join('')||'<div class="empty">Nenhum produto encontrado.</div>'}
function addToCart(id){let p=state.products.find(x=>x.id==id);if(!p)return showToast('Produto não encontrado');let av=availableSizes(p);let size=av[0]||sizes[0];let line=state.cart.find(x=>x.id==id&&x.size==size);if(line)line.qty++;else state.cart.push({id,size,qty:1});save();showToast('Produto adicionado ao carrinho');if(pageName=='pdv')renderCartLines()}
function updateCart(){document.getElementById('cartCount').textContent=state.cart.reduce((a,i)=>a+i.qty,0)}
function renderCartLines(){let box=document.getElementById('cartLines');if(!box)return;box.innerHTML=state.cart.map((i,idx)=>{let p=state.products.find(x=>x.id==i.id)||{};return `<div class="cart-line"><div><b>${p.name||'Produto'}</b><br><small>${p.color||''} • Tamanho ${i.size}</small></div><input type="number" min="1" value="${i.qty}" onchange="state.cart[${idx}].qty=+this.value;save();renderCartLines()"><div>${money((+p.price||0)*i.qty)}</div><button class="danger-btn" onclick="state.cart.splice(${idx},1);save();renderCartLines()">×</button></div>`}).join('')||'<div class="empty">Carrinho vazio.</div>';let total=state.cart.reduce((a,i)=>{let p=state.products.find(x=>x.id==i.id)||{};return a+(+p.price||0)*i.qty},0);let el=document.getElementById('pdvTotal');if(el)el.textContent=money(total)}
function openCart(){modalContent.innerHTML=`<div class="modal-head"><h2>Carrinho</h2><button class="x" onclick="closeModal()">✕</button></div><div id="modalCart"></div><div style="display:flex;gap:10px;margin-top:12px"><button class="green-btn" style="width:100%" onclick="sendWhatsApp()">Enviar pedido no WhatsApp</button></div>`;modal.classList.add('show');let old=cartLines;let box=document.getElementById('modalCart');box.innerHTML=state.cart.map((i,idx)=>{let p=state.products.find(x=>x.id==i.id)||{};return `<div class="cart-line"><div><b>${p.name||'Produto'}</b><br><small>${p.color||''} • Tam. ${i.size}</small></div><input type="number" min="1" value="${i.qty}" onchange="state.cart[${idx}].qty=+this.value;save();openCart()"><div>${money((+p.price||0)*i.qty)}</div><button class="danger-btn" onclick="state.cart.splice(${idx},1);save();openCart()">×</button></div>`}).join('')||'<div class="empty">Carrinho vazio.</div>';box.innerHTML+=`<div class="total-box">Total<br><strong>${money(state.cart.reduce((a,i)=>a+(+(state.products.find(p=>p.id==i.id)?.price)||0)*i.qty,0))}</strong></div>`}
function finishSale(){if(!state.cart.length)return showToast('Carrinho vazio');let items=state.cart.map(i=>{let p=state.products.find(x=>x.id==i.id);return {id:i.id,name:p?.name,size:i.size,qty:i.qty,price:+p?.price||0}});let total=items.reduce((a,i)=>a+i.qty*i.price,0);items.forEach(i=>{let p=state.products.find(x=>x.id==i.id);if(p)p.stock[i.size]=Math.max(0,(+p.stock[i.size]||0)-i.qty)});state.sales.push({id:uid(),date:new Date().toISOString(),items,total,pay:document.getElementById('pay')?.value||'Pedido WhatsApp'});state.cart=[];save();showToast('Venda finalizada e estoque atualizado');if(pageName=='pdv')pdv()}
function sendWhatsApp(){if(!state.cart.length)return showToast('Carrinho vazio');let c=state.company;let lines=[c.messageIntro||'Olá, FamilyKids! Gostaria de solicitar este pedido:',''];let total=0;state.cart.forEach(i=>{let p=state.products.find(x=>x.id==i.id)||{};let sub=(+p.price||0)*i.qty;total+=sub;lines.push(`🛍️ ${i.qty}x ${p.name||'Produto'}\n📏 Tamanho: ${i.size}\n🎨 Cor: ${p.color||'-'}\n💰 Valor: ${money(sub)}\n`) });lines.push(`💰 Total: ${money(total)}`,'','Nome:','Telefone:','Forma de pagamento:','',`📍 ${c.storeName}`);let phone=(c.whatsapp||'').replace(/\D/g,'');let url=`https://wa.me/${phone}?text=${encodeURIComponent(lines.join('\n'))}`;window.open(url,'_blank')}
function estoque(){page.innerHTML=`<div class="section-title"><h2>Estoque</h2><button class="orange-btn" onclick="openProductForm()">Entrada de produto</button></div><div class="card"><table class="table"><tr><th>Produto</th><th>Categoria</th><th>Cor</th><th>Tamanhos disponíveis</th><th>Total</th></tr>${state.products.map(p=>`<tr><td>${p.name}</td><td>${p.cat}</td><td>${p.color||'-'}</td><td>${availableSizes(p).join(' • ')||'Esgotado'}</td><td>${productTotal(p)}</td></tr>`).join('')||'<tr><td colspan="5">Nenhum produto.</td></tr>'}</table></div>`}
function vendas(){page.innerHTML=`<div class="section-title"><h2>Vendas</h2><button class="green-btn" onclick="openPage('pdv')">Nova venda</button></div><div class="card">${salesTable(state.sales.slice().reverse())}</div>`}
function genericList(type,title,fields){let arr=state[type];page.innerHTML=`<div class="section-title"><h2>${title}</h2><button class="orange-btn" onclick="addGeneric('${type}','${title}')">Adicionar</button></div><div class="card"><table class="table"><tr>${fields.map(f=>`<th>${f}</th>`).join('')}<th></th></tr>${arr.map((o,i)=>`<tr>${fields.map(f=>`<td>${o[f]||''}</td>`).join('')}<td><button class="danger-btn" onclick="state.${type}.splice(${i},1);save();renderPage()">Excluir</button></td></tr>`).join('')||`<tr><td colspan="${fields.length+1}">Nenhum cadastro.</td></tr>`}</table></div>`}
function addGeneric(type,title){let name=prompt('Nome:');if(!name)return;let phone=prompt('Telefone/WhatsApp:')||'';state[type].push({Nome:name,Telefone:phone});save();renderPage()}
function clientes(){genericList('clients','Clientes',['Nome','Telefone'])}
function fornecedores(){genericList('suppliers','Fornecedores',['Nome','Telefone'])}
function relatorios(){let t=totals();page.innerHTML=`<h2>Relatórios</h2><div class="grid stats"><div class="card stat"><div class="label">Vendas hoje</div><div class="value">${money(t.today)}</div></div><div class="card stat"><div class="label">Vendas mês</div><div class="value">${money(t.month)}</div></div><div class="card stat"><div class="label">Estoque</div><div class="value">${t.stock}</div></div><div class="card stat"><div class="label">Produtos</div><div class="value">${state.products.length}</div></div></div>`}
function config(){page.innerHTML=`<div class="section-title"><h2>Configurações</h2><button class="orange-btn" onclick="saveConfig()">Salvar</button></div><div class="card"><h3>Dados da empresa</h3><div class="forms" id="cfg">${Object.entries(state.company).map(([k,v])=>`<div class="field col-4"><label>${k}</label><input data-k="${k}" value="${String(v).replaceAll('"','&quot;')}"></div>`).join('')}</div></div><div class="grid columns"><div class="card"><h3>Categorias</h3>${listEdit('cats')}</div><div class="card"><h3>Subcategoria 1</h3>${listEdit('sub1')}<h3>Subcategoria 2</h3>${listEdit('sub2')}</div></div>`}
function listEdit(key){return `<div class="chips" style="margin-bottom:10px">${state[key].map((x,i)=>`<span class="chip">${x} <button onclick="state.${key}.splice(${i},1);save();config()">×</button></span>`).join('')}</div><button class="ghost-btn" onclick="let v=prompt('Novo item'); if(v){state.${key}.push(v);save();config()}">Adicionar</button>`}
function saveConfig(){document.querySelectorAll('#cfg input').forEach(i=>state.company[i.dataset.k]=i.value);save();showToast('Configurações salvas')}
function backup(){page.innerHTML=`<h2>Backup</h2><div class="grid columns"><div class="card"><h3>Exportar backup</h3><p>Baixe um arquivo com produtos, vendas e configurações.</p><button class="orange-btn" onclick="exportBackup()">Exportar</button></div><div class="card"><h3>Importar backup</h3><input type="file" accept="application/json" onchange="importBackup(this)"></div></div>`}
function exportBackup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='backup-familykids-erp.json';a.click()}
function importBackup(inp){let f=inp.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{state=JSON.parse(r.result);save();showToast('Backup importado');openPage('dashboard')};r.readAsText(f)}
function openPublicCatalog(){publicMode=true;document.body.innerHTML=`<div class="public"><header class="public-header"><img src="${LOGO}"><h1>${state.company.storeName}</h1><p>Moda infantil com carinho para cada fase da infância.</p><div class="public-nav"><button class="orange-btn" onclick="location.reload()">Área administrativa</button><button class="green-btn" onclick="sendWhatsApp()">Finalizar pelo WhatsApp</button></div></header><main class="public-main"><div class="store-info"><div class="info-card">📱 ${state.company.whatsapp}</div><div class="info-card">📸 ${state.company.instagram}</div><div class="info-card">📍 ${state.company.address} ${state.company.city}</div><div class="info-card">🕘 ${state.company.hours}</div></div><div class="filters"><select id="fcat" onchange="renderPublicGrid()"><option>Todos</option>${state.cats.map(x=>`<option>${x}</option>`).join('')}</select><select id="fsub1" onchange="renderPublicGrid()"><option>Todos</option>${state.sub1.map(x=>`<option>${x}</option>`).join('')}</select><select id="fsub2" onchange="renderPublicGrid()"><option>Todos</option>${state.sub2.map(x=>`<option>${x}</option>`).join('')}</select><input id="fq" oninput="renderPublicGrid()" placeholder="Buscar produto..."></div><div class="products-grid" id="publicGrid"></div></main><button class="cart-float" onclick="openCart()">🛒 Carrinho <span id="cartCount">${state.cart.reduce((a,i)=>a+i.qty,0)}</span></button><div class="modal" id="modal"><div class="modal-card" id="modalContent"></div></div><div class="toast" id="toast"></div></div>`;renderPublicGrid()}
function renderPublicGrid(){let arr=filtered();if(!arr.length){arr=[{id:'demo1',name:'Vestido Floral Demonstrativo',cat:'Menina',sub1:'Verão',sub2:'Vestido',color:'Rosa',price:109.90,stock:{'4':1,'6':2,'8':1},photos:[placeholder('Menina')]},{id:'demo2',name:'Conjunto Dino Demonstrativo',cat:'Menino',sub1:'Verão',sub2:'Conjunto',color:'Azul',price:99.90,stock:{'1':1,'2':1,'3':1},photos:[placeholder('Menino')]},{id:'demo3',name:'Laço Boutique Demonstrativo',cat:'Acessórios',sub1:'Verão',sub2:'Laço',color:'Vermelho',price:24.90,stock:{'P':3},photos:[placeholder('Acessórios')]}]}
 document.getElementById('publicGrid').innerHTML=arr.map(p=>productCard(p,false)).join('')}
window.addEventListener('hashchange',()=>{if(location.hash=='#catalogo')openPublicCatalog()});
renderNav();renderMini();updateCart(); if(location.hash=='#catalogo')openPublicCatalog(); else renderPage();
</script>
</body></html>
