<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>FamilyKids ERP • PDV + Catálogo</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#172033;--muted:#6b7280;--line:#e5e7eb;--brand:#6d28d9;--brand2:#8b5cf6;--danger:#dc2626;--ok:#16a34a;--warn:#f59e0b;--shadow:0 12px 30px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}button{cursor:pointer;border:0;border-radius:12px;padding:10px 14px;background:var(--brand);color:white;font-weight:700}button.secondary{background:#eef2ff;color:#3730a3}button.ghost{background:white;color:var(--text);border:1px solid var(--line)}button.danger{background:var(--danger)}button.ok{background:var(--ok)}button:disabled{opacity:.5;cursor:not-allowed}.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.side{background:#111827;color:white;padding:18px;position:sticky;top:0;height:100vh;overflow:auto}.logo{display:flex;gap:12px;align-items:center;margin-bottom:18px}.mark{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--brand),#ec4899);display:grid;place-items:center;font-weight:900}.logo b{font-size:18px}.logo small{display:block;color:#cbd5e1}.nav{display:grid;gap:7px}.nav button{background:transparent;color:#cbd5e1;text-align:left;padding:12px;border-radius:12px;font-weight:650}.nav button.active,.nav button:hover{background:rgba(255,255,255,.12);color:#fff}.main{padding:22px;max-width:1280px;width:100%;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:18px}.top h1{margin:0;font-size:28px}.top p{margin:5px 0 0;color:var(--muted)}.grid{display:grid;gap:14px}.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow)}.metric{font-size:25px;font-weight:900;margin-top:8px}.label{color:var(--muted);font-size:13px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.form{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.form.two{grid-template-columns:repeat(2,minmax(0,1fr))}.field label{display:block;font-size:12px;color:var(--muted);margin:0 0 4px 2px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);background:white;border-radius:12px;padding:10px;color:var(--text)}.field textarea{min-height:76px;resize:vertical}.full{grid-column:1/-1}.tablewrap{overflow:auto;border-radius:14px;border:1px solid var(--line)}table{width:100%;border-collapse:collapse;background:white}th,td{padding:11px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}th{font-size:12px;text-transform:uppercase;color:var(--muted);background:#f9fafb}td.actions{display:flex;gap:6px}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800;background:#eef2ff;color:#4338ca}.pill.ok{background:#dcfce7;color:#166534}.pill.warn{background:#fef3c7;color:#92400e}.pill.danger{background:#fee2e2;color:#991b1b}.catalog{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.product{overflow:hidden;padding:0}.photo{height:160px;background:linear-gradient(135deg,#f5d0fe,#ddd6fe);display:grid;place-items:center;color:#6b21a8;font-weight:900}.product .body{padding:14px}.product h3{margin:0 0 6px}.price{font-size:22px;font-weight:900;color:#111827}.muted{color:var(--muted)}.split{display:grid;grid-template-columns:1.5fr .9fr;gap:14px}.cartline{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line);padding:10px 0}.total{font-size:28px;font-weight:950}.hide{display:none!important}.toast{position:fixed;right:18px;bottom:18px;background:#111827;color:white;padding:12px 14px;border-radius:14px;box-shadow:var(--shadow);z-index:10}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:grid;place-items:center;z-index:20;padding:16px}.modalbox{background:white;border-radius:18px;padding:18px;max-width:720px;width:100%;max-height:90vh;overflow:auto}.small{font-size:12px}.dangerText{color:var(--danger);font-weight:800}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.main{padding:14px}.cards,.form,.catalog,.split{grid-template-columns:1fr}.top{display:block}.nav{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
<aside class="side"><div class="logo"><div class="mark">FK</div><div><b>FamilyKids ERP</b><small>PDV • Catálogo • Estoque</small></div></div><div class="nav" id="nav"></div></aside>
<main class="main" id="main"></main>
</div><div id="toast" class="toast hide"></div>
<script>
const money=n=>(+n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});const id=()=>crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random());
const defaultData={settings:{categories:['Menino','Menina','Acessórios'],season1:['Verão','Inverno'],types:['Conjunto','Vestido','Blusa','Camiseta','Bermuda','Short','Calça','Legging','Macacão','Body','Banho','Jaqueta','Casaco','Saia','Acessório','Outros'],grades:{'PMG':['P','M','G'],'1–3':['1','2','3'],'4–10':['4','6','8','10'],'12–16':['12','14','16']},payments:['PIX','Dinheiro','Débito','Crédito','Crediário']},products:[],clients:[],suppliers:[],sales:[],moves:[]};
let db=JSON.parse(localStorage.getItem('familykids_erp_v3')||'null')||defaultData;let route='dashboard';let cart=[];let editing=null;
function save(){localStorage.setItem('familykids_erp_v3',JSON.stringify(db))}function toast(t){let e=document.getElementById('toast');e.textContent=t;e.classList.remove('hide');setTimeout(()=>e.classList.add('hide'),2500)}
const pages=[['dashboard','Dashboard'],['products','Produtos'],['catalog','Catálogo'],['pdv','PDV'],['stock','Estoque'],['sales','Vendas'],['clients','Clientes'],['suppliers','Fornecedores'],['settings','Configurações'],['backup','Backup']];
function drawNav(){nav.innerHTML=pages.map(p=>`<button class="${route==p[0]?'active':''}" onclick="go('${p[0]}')">${p[1]}</button>`).join('')}function go(r){route=r;editing=null;render()}function render(){drawNav();({dashboard,products,catalog,pdv,stock,sales,clients,suppliers,settings,backup}[route])()}
function sumStock(p){return Object.values(p.stock||{}).reduce((a,b)=>a+(+b||0),0)}function allProducts(){return db.products}
function dashboard(){let today=new Date().toISOString().slice(0,10);let salesToday=db.sales.filter(s=>s.date.slice(0,10)==today);let totalToday=salesToday.reduce((a,s)=>a+s.total,0);let totalMonth=db.sales.filter(s=>s.date.slice(0,7)==today.slice(0,7)).reduce((a,s)=>a+s.total,0);let low=db.products.filter(p=>sumStock(p)<= (+p.minStock||0));main.innerHTML=`<div class="top"><div><h1>Dashboard</h1><p>Visão geral da loja, vendas, estoque e produtos.</p></div><button onclick="go('pdv')">Abrir PDV</button></div><div class="grid cards"><div class="card"><div class="label">Vendas hoje</div><div class="metric">${money(totalToday)}</div></div><div class="card"><div class="label">Vendas do mês</div><div class="metric">${money(totalMonth)}</div></div><div class="card"><div class="label">Produtos cadastrados</div><div class="metric">${db.products.length}</div></div><div class="card"><div class="label">Estoque baixo</div><div class="metric">${low.length}</div></div></div><div class="grid" style="margin-top:14px"><div class="card"><h2>Últimas vendas</h2>${salesTable(db.sales.slice(-8).reverse())}</div><div class="card"><h2>Alertas de estoque</h2>${low.length?stockTable(low):'<p class="muted">Nenhum produto abaixo do mínimo.</p>'}</div></div>`}
function productForm(p={}){let s=db.settings;let grade=p.grade||Object.keys(s.grades)[0];return `<div class="card"><h2>${editing?'Editar produto':'Novo produto'}</h2><div class="form"><div class="field"><label>Código interno</label><input id="sku" value="${p.sku||''}"></div><div class="field"><label>Código de barras</label><input id="barcode" value="${p.barcode||''}"></div><div class="field full"><label>Descrição</label><input id="desc" value="${p.desc||''}" placeholder="Ex: Vestido floral rosa"></div><div class="field"><label>Categoria</label><select id="category">${s.categories.map(x=>`<option ${p.category==x?'selected':''}>${x}</option>`)}</select></div><div class="field"><label>Subcategoria 1</label><select id="season">${s.season1.map(x=>`<option ${p.season==x?'selected':''}>${x}</option>`)}</select></div><div class="field"><label>Subcategoria 2</label><select id="type">${s.types.map(x=>`<option ${p.type==x?'selected':''}>${x}</option>`)}</select></div><div class="field"><label>Grade</label><select id="grade" onchange="render()">${Object.keys(s.grades).map(x=>`<option ${grade==x?'selected':''}>${x}</option>`)}</select></div><div class="field"><label>Marca</label><input id="brand" value="${p.brand||''}"></div><div class="field"><label>Fornecedor</label><input id="supplier" value="${p.supplier||''}"></div><div class="field"><label>Cor</label><input id="color" value="${p.color||''}"></div><div class="field"><label>Estoque mínimo</label><input type="number" id="minStock" value="${p.minStock||0}"></div><div class="field"><label>Custo</label><input type="number" step="0.01" id="cost" value="${p.cost||''}"></div><div class="field"><label>Preço venda</label><input type="number" step="0.01" id="price" value="${p.price||''}"></div><div class="field"><label>Preço promocional</label><input type="number" step="0.01" id="promo" value="${p.promo||''}"></div><div class="field full"><label>Foto principal (URL opcional)</label><input id="photo" value="${p.photo||''}" placeholder="Cole o link de uma foto"></div><div class="field full"><label>Observações</label><textarea id="obs">${p.obs||''}</textarea></div><div class="full"><b>Estoque por tamanho</b><div class="form" style="margin-top:8px">${s.grades[grade].map(t=>`<div class="field"><label>Tam. ${t}</label><input type="number" data-size="${t}" class="st" value="${(p.stock||{})[t]||0}"></div>`).join('')}</div></div><div class="full row"><button onclick="saveProduct()">Salvar produto</button>${editing?'<button class="ghost" onclick="editing=null;render()">Cancelar</button>':''}</div></div></div>`}
function getProductFromForm(){let grade=document.getElementById('grade').value;let stock={};document.querySelectorAll('.st').forEach(e=>stock[e.dataset.size]=+e.value||0);return {id:editing||id(),sku:sku.value||('FK-'+String(Date.now()).slice(-6)),barcode:barcode.value,desc:desc.value,category:category.value,season:season.value,type:type.value,grade,brand:brand.value,supplier:supplier.value,color:color.value,minStock:+minStock.value||0,cost:+cost.value||0,price:+price.value||0,promo:+promo.value||0,photo:photo.value,obs:obs.value,stock}}
function saveProduct(){let p=getProductFromForm();if(!p.desc)return toast('Informe a descrição do produto.');let i=db.products.findIndex(x=>x.id==p.id);if(i>=0)db.products[i]=p;else db.products.push(p);save();editing=null;toast('Produto salvo.');products()}
function products(){let list=db.products;main.innerHTML=`<div class="top"><div><h1>Produtos</h1><p>Cadastro completo por categoria, estação, tipo, cor, grade e tamanho.</p></div></div>${productForm(editing?db.products.find(p=>p.id==editing):{})}<div class="card" style="margin-top:14px"><h2>Produtos cadastrados</h2>${productTable(list)}</div>`}
function productTable(list){return `<div class="tablewrap"><table><thead><tr><th>SKU</th><th>Produto</th><th>Categoria</th><th>Sub 1</th><th>Sub 2</th><th>Grade</th><th>Cor</th><th>Estoque</th><th>Preço</th><th>Ações</th></tr></thead><tbody>${list.map(p=>`<tr><td>${p.sku}</td><td>${p.desc}</td><td>${p.category}</td><td>${p.season}</td><td>${p.type}</td><td>${p.grade}</td><td>${p.color||'-'}</td><td><span class="pill ${sumStock(p)<=p.minStock?'danger':'ok'}">${sumStock(p)}</span></td><td>${money(p.promo||p.price)}</td><td class="actions"><button class="secondary" onclick="editing='${p.id}';products()">Editar</button><button class="danger" onclick="delProduct('${p.id}')">Excluir</button></td></tr>`).join('')||'<tr><td colspan="10">Nenhum produto cadastrado.</td></tr>'}</tbody></table></div>`}
function delProduct(pid){if(confirm('Excluir produto?')){db.products=db.products.filter(p=>p.id!=pid);save();products()}}
function catalog(){let cats=['Todos',...db.settings.categories], seas=['Todos',...db.settings.season1], types=['Todos',...db.settings.types];main.innerHTML=`<div class="top"><div><h1>Catálogo</h1><p>Visual profissional para consultar produtos e compartilhar no WhatsApp.</p></div></div><div class="card"><div class="row"><select id="fc" onchange="catalog()">${cats.map(x=>`<option ${sessionStorage.fc==x?'selected':''}>${x}</option>`)}</select><select id="fs" onchange="catalog()">${seas.map(x=>`<option ${sessionStorage.fs==x?'selected':''}>${x}</option>`)}</select><select id="ft" onchange="catalog()">${types.map(x=>`<option ${sessionStorage.ft==x?'selected':''}>${x}</option>`)}</select><input id="fq" placeholder="Buscar..." oninput="sessionStorage.fq=this.value;catalog()" value="${sessionStorage.fq||''}"></div></div><div class="catalog" style="margin-top:14px">${filtered().map(card).join('')||'<div class="card">Nenhum produto encontrado.</div>'}</div>`;['fc','fs','ft'].forEach(k=>{let e=document.getElementById(k);e&& (sessionStorage[k]=e.value)})}
function filtered(){let q=(sessionStorage.fq||'').toLowerCase(),fc=sessionStorage.fc||'Todos',fs=sessionStorage.fs||'Todos',ft=sessionStorage.ft||'Todos';return db.products.filter(p=>(fc=='Todos'||p.category==fc)&&(fs=='Todos'||p.season==fs)&&(ft=='Todos'||p.type==ft)&&(!q||(p.desc+p.sku+p.brand+p.color).toLowerCase().includes(q)))}
function card(p){return `<div class="card product"><div class="photo">${p.photo?`<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover">`:'FamilyKids'}</div><div class="body"><h3>${p.desc}</h3><div class="muted">${p.category} • ${p.season} • ${p.type}</div><div class="price">${money(p.promo||p.price)}</div><p class="small">Cor: ${p.color||'-'} | Grade: ${p.grade} | Estoque: ${sumStock(p)}</p><div class="row"><button onclick="shareProd('${p.id}')">WhatsApp</button><button class="secondary" onclick="addModal('${p.id}')">Vender</button></div></div></div>`}
function shareProd(pid){let p=db.products.find(x=>x.id==pid);let txt=`${p.desc}\n${p.category} • ${p.season} • ${p.type}\nCor: ${p.color||'-'}\nPreço: ${money(p.promo||p.price)}\nDisponível na FamilyKids`;location.href='https://wa.me/?text='+encodeURIComponent(txt)}
function addModal(pid){let p=db.products.find(x=>x.id==pid);let sizes=Object.keys(p.stock).filter(s=>p.stock[s]>0);document.body.insertAdjacentHTML('beforeend',`<div class="modal" id="m"><div class="modalbox"><h2>Adicionar ao carrinho</h2><p><b>${p.desc}</b> — ${money(p.promo||p.price)}</p><div class="form two"><div class="field"><label>Tamanho</label><select id="msize">${sizes.map(s=>`<option>${s}</option>`)}</select></div><div class="field"><label>Quantidade</label><input id="mqty" type="number" value="1" min="1"></div></div><div class="row" style="margin-top:14px"><button onclick="addCart('${pid}',msize.value,+mqty.value||1);m.remove()">Adicionar</button><button class="ghost" onclick="m.remove()">Cancelar</button></div></div></div>`)}
function addCart(pid,size,qty){let p=db.products.find(x=>x.id==pid);if(!p||(+p.stock[size]||0)<qty)return toast('Estoque insuficiente.');cart.push({pid,size,qty,price:p.promo||p.price,discount:0});toast('Item no carrinho.');if(route=='pdv')pdv()}
function pdv(){main.innerHTML=`<div class="top"><div><h1>PDV</h1><p>Frente de caixa com carrinho, pagamento e baixa automática do estoque.</p></div></div><div class="split"><div><div class="card"><div class="field"><label>Buscar produto</label><input id="search" oninput="pdvResults(this.value)" placeholder="Código, nome, marca, categoria..."></div><div id="res" style="margin-top:10px"></div></div></div><div class="card"><h2>Carrinho</h2><div id="cart">${cartHtml()}</div></div></div>`}
function pdvResults(q){q=q.toLowerCase();let r=db.products.filter(p=>(p.desc+p.sku+p.barcode+p.brand+p.category+p.type).toLowerCase().includes(q)).slice(0,8);res.innerHTML=productTableMini(r)}function productTableMini(r){return `<div class="tablewrap"><table><tbody>${r.map(p=>`<tr><td>${p.desc}<br><span class="small muted">${p.sku} • ${p.color||'-'} • Estoque ${sumStock(p)}</span></td><td>${money(p.promo||p.price)}</td><td><button onclick="addModal('${p.id}')">Adicionar</button></td></tr>`).join('')||'<tr><td>Pesquise um produto.</td></tr>'}</tbody></table></div>`}
function cartHtml(){let total=cart.reduce((a,i)=>a+(i.price*i.qty)-(+i.discount||0),0);return `${cart.map((i,n)=>{let p=db.products.find(x=>x.id==i.pid);return `<div class="cartline"><div><b>${p?.desc}</b><br><span class="small">Tam. ${i.size} • Qtd ${i.qty}</span></div><div>${money(i.price*i.qty)}</div><button class="danger" onclick="cart.splice(${n},1);pdv()">x</button></div>`}).join('')||'<p class="muted">Carrinho vazio.</p>'}<hr><div class="row" style="justify-content:space-between"><span>Total</span><span class="total">${money(total)}</span></div><div class="field"><label>Pagamento</label><select id="pay">${db.settings.payments.map(x=>`<option>${x}</option>`)}</select></div><button class="ok" style="width:100%;margin-top:10px" ${cart.length?'':'disabled'} onclick="finishSale()">Finalizar venda</button>`}
function finishSale(){let total=cart.reduce((a,i)=>a+(i.price*i.qty)-(+i.discount||0),0);for(let i of cart){let p=db.products.find(x=>x.id==i.pid);if(!p||p.stock[i.size]<i.qty)return toast('Estoque insuficiente.')}cart.forEach(i=>{let p=db.products.find(x=>x.id==i.pid);p.stock[i.size]-=i.qty;db.moves.push({date:new Date().toISOString(),type:'Saída por venda',product:p.desc,size:i.size,qty:i.qty})});db.sales.push({id:id(),date:new Date().toISOString(),items:cart,payment:pay.value,total});cart=[];save();toast('Venda finalizada.');pdv()}
function stock(){main.innerHTML=`<div class="top"><div><h1>Estoque</h1><p>Consulta de saldo por produto, cor e tamanho.</p></div></div><div class="card">${stockTable(db.products)}</div>`}function stockTable(list){return `<div class="tablewrap"><table><thead><tr><th>Produto</th><th>Cor</th><th>Grade</th><th>Tamanhos</th><th>Total</th></tr></thead><tbody>${list.map(p=>`<tr><td>${p.desc}</td><td>${p.color||'-'}</td><td>${p.grade}</td><td>${Object.entries(p.stock||{}).map(([s,q])=>`${s}: ${q}`).join(' | ')}</td><td>${sumStock(p)}</td></tr>`).join('')||'<tr><td colspan="5">Sem produtos.</td></tr>'}</tbody></table></div>`}
function salesTable(list){return `<div class="tablewrap"><table><thead><tr><th>Data</th><th>Itens</th><th>Pagamento</th><th>Total</th></tr></thead><tbody>${list.map(s=>`<tr><td>${new Date(s.date).toLocaleString('pt-BR')}</td><td>${s.items.length}</td><td>${s.payment}</td><td>${money(s.total)}</td></tr>`).join('')||'<tr><td colspan="4">Nenhuma venda.</td></tr>'}</tbody></table></div>`}function sales(){main.innerHTML=`<div class="top"><div><h1>Vendas</h1><p>Histórico de vendas finalizadas.</p></div></div><div class="card">${salesTable(db.sales.slice().reverse())}</div>`}
function simpleCrud(kind,title,fields){let arr=db[kind];main.innerHTML=`<div class="top"><div><h1>${title}</h1><p>Cadastro auxiliar.</p></div></div><div class="card"><div class="form">${fields.map(f=>`<div class="field"><label>${f}</label><input id="${f}"></div>`).join('')}<div class="full"><button onclick="addSimple('${kind}','${fields.join('|')}')">Adicionar</button></div></div></div><div class="card" style="margin-top:14px"><div class="tablewrap"><table><tbody>${arr.map((o,i)=>`<tr>${fields.map(f=>`<td>${o[f]||''}</td>`).join('')}<td><button class="danger" onclick="db.${kind}.splice(${i},1);save();render()">Excluir</button></td></tr>`).join('')||'<tr><td>Nenhum cadastro.</td></tr>'}</tbody></table></div></div>`}
function addSimple(kind,fs){let o={id:id()};fs.split('|').forEach(f=>o[f]=document.getElementById(f).value);db[kind].push(o);save();render()}function clients(){simpleCrud('clients','Clientes',['Nome','WhatsApp','Nascimento','Observações'])}function suppliers(){simpleCrud('suppliers','Fornecedores',['Nome','Marca','Cidade','Estado','WhatsApp','Representante'])}
function settings(){main.innerHTML=`<div class="top"><div><h1>Configurações</h1><p>Cadastre, edite e remova categorias, subcategorias e formas de pagamento.</p></div></div>${settingBlock('categories','Categorias')}${settingBlock('season1','Subcategoria 1')}${settingBlock('types','Subcategoria 2')}${settingBlock('payments','Formas de pagamento')}`}
function settingBlock(k,t){return `<div class="card" style="margin-bottom:14px"><h2>${t}</h2><div class="row"><input id="new_${k}" placeholder="Novo item"><button onclick="addSetting('${k}')">Adicionar</button></div><div class="row" style="margin-top:10px">${db.settings[k].map((x,i)=>`<span class="pill">${x} <button class="danger" style="padding:2px 6px;margin-left:6px" onclick="delSetting('${k}',${i})">x</button></span>`).join('')}</div></div>`}function addSetting(k){let v=document.getElementById('new_'+k).value.trim();if(v&&!db.settings[k].includes(v)){db.settings[k].push(v);save();settings()}}function delSetting(k,i){db.settings[k].splice(i,1);save();settings()}
function backup(){main.innerHTML=`<div class="top"><div><h1>Backup</h1><p>Exporte e importe os dados locais do sistema.</p></div></div><div class="card row"><button onclick="exportBackup()">Exportar backup</button><input type="file" id="imp" accept=".json" onchange="importBackup(this.files[0])"><button class="danger" onclick="if(confirm('Apagar todos os dados?')){localStorage.removeItem('familykids_erp_v3');location.reload()}">Zerar sistema</button></div>`}function exportBackup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='backup-familykids-erp.json';a.click()}function importBackup(f){let r=new FileReader();r.onload=()=>{db=JSON.parse(r.result);save();toast('Backup importado.');render()};r.readAsText(f)}
render();
</script>
</body>
</html>
